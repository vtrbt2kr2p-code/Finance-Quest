<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Quest</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0E1420">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance Quest">
<style>
  :root {
    --bg: #0E1420; --card: #161C29; --card2: #1E2534; --border: #23293A;
    --text: #EDEBE3; --dim: #8A8FA0; --soft: #B4B8C4; --gold: #D4AF37;
  }
  [data-theme="light"] {
    --bg: #F6F2E7; --card: #FFFFFF; --card2: #F0ECDD; --border: #E4DEC9;
    --text: #20242C; --dim: #6E7280; --soft: #4B4F58; --gold: #D4AF37;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #05070C; }
  body { display: flex; justify-content: center; padding: 20px 10px; min-height: 100vh; }
  #app {
    font-family: var(--app-font, 'Georgia','Times New Roman',serif);
    background: var(--bg); color: var(--text);
    width: 100%; max-width: 480px; min-height: 640px;
    border-radius: 18px; overflow: hidden; border: 1px solid var(--border);
    position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  button { font-family: inherit; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0); opacity:1 } 100% { transform: translateY(420px) rotate(360deg); opacity:0 } }
  .fq-header { padding: 18px 18px 0; border-bottom: 1px solid var(--border); }
  .fq-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .fq-brand { display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .fq-brand-mark { width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#D4AF37,#8A6D1E);color:#0E1420;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px; }
  .fq-brand-name { font-size:15px; font-weight:bold; }
  .fq-brand-sub { font-size:11px; color:var(--dim); font-style:italic; }
  .fq-header-icons { display:flex; gap:6px; }
  .fq-icon-btn { width:28px;height:28px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px; }
  .fq-icon-btn.active { color:var(--gold); border-color:var(--gold); }
  .fq-nav { display:flex; gap:2px; padding-bottom:8px; overflow-x:auto; }
  .fq-navbtn { display:flex;align-items:center;gap:4px;background:transparent;border:none;color:var(--dim);font-size:10.5px;padding:6px 8px;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap;flex-shrink:0; }
  .fq-navbtn.active { color: var(--gold); border-bottom:2px solid var(--gold); }
  .fq-body { padding: 16px 18px; max-height: 560px; overflow-y:auto; }
  .fq-intro { display:flex; gap:8px; align-items:flex-start; font-size:12px; color:var(--soft); margin-bottom:14px; line-height:1.5; }
  .fq-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .fq-level { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid; border-radius:12px; padding:10px 12px; margin-bottom:8px; cursor:pointer; width:100%; text-align:left; }
  .fq-level[disabled] { opacity:.5; cursor:not-allowed; }
  .fq-level-num { width:28px;height:28px;border-radius:50%;color:#0E1420;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0; }
  .fq-level-title { font-size:14px; font-weight:bold; }
  .fq-level-sub { font-size:11px; color:var(--dim); font-style:italic; }
  .fq-level-score { font-size:11px; font-family:monospace; color:var(--dim); }
  .fq-btn-primary { display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border:none;color:#0E1420;font-weight:bold;padding:11px;border-radius:10px;margin-top:14px;cursor:pointer;font-size:13px;background:linear-gradient(135deg,#D4AF37,#B8942E); }
  .fq-btn-secondary { display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text);padding:11px;border-radius:10px;cursor:pointer;font-size:13px;flex:1; }
  .fq-answers { display:flex; flex-direction:column; gap:8px; }
  .fq-answer { display:flex;justify-content:space-between;align-items:center;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-size:13px;text-align:left;cursor:pointer; }
  .fq-answer.correct { background:rgba(138,168,118,0.18); border-color:#8AA876; }
  .fq-answer.wrong { background:rgba(184,92,92,0.18); border-color:#B85C5C; }
  .fq-progress-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .fq-progress-fill { height:100%; transition:width .3s ease; }
  .fq-lives { display:flex; gap:2px; }
  .fq-input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:13px; margin-bottom:12px; font-family:inherit; }
  .fq-avatar-row { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .fq-avatar-btn { width:38px;height:38px;border-radius:10px;font-size:18px;background:var(--card2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .fq-avatar-btn.active { border-color:var(--gold); background:rgba(212,175,55,0.15); }
  .fq-formula-row, .fq-glossary-row { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .fq-glossary-row { display:block; }
  .fq-formula-name { font-size:12px; color:var(--text); }
  .fq-formula-expr { font-size:12px; font-family:monospace; color:var(--gold); text-align:right; }
  .fq-cat-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin:14px 0 6px; }
  .fq-flash { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:30px 18px; min-height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:pointer; }
  .fq-footer { padding:8px 18px 16px; text-align:center; }
  .fq-reset-link { background:transparent; border:none; color:var(--dim); font-size:10px; cursor:pointer; opacity:.6; }
  .fq-splash { min-height:640px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
  .fq-splash-logo { width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#D4AF37,#8A6D1E);color:#0E1420;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:26px;margin-bottom:18px; box-shadow:0 8px 24px rgba(212,175,55,.35); }
  .fq-chart { display:flex; align-items:flex-end; gap:6px; height:120px; padding:10px 0; }
  .fq-chart-bar { flex:1; background:var(--gold); border-radius:4px 4px 0 0; min-height:2px; display:flex; align-items:flex-end; justify-content:center; }
  .fq-chart-label { font-size:9px; color:var(--dim); text-align:center; margin-top:4px; }
  .fq-daily { background:var(--card); border:1px solid #F59E0B44; border-radius:14px; padding:14px; margin-bottom:16px; }
  .fq-toggle-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:10px; }
  .fq-font-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .fq-font-btn { display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px;cursor:pointer; }
  .fq-font-btn.active { border-color:var(--gold); background:rgba(212,175,55,.12); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const LEVELS = [
  {
    id: 0, title: "Fondations", subtitle: "L'argent, le temps, le risque",
    color: "#C9A227",
    modules: [
      {
        lesson: "Un euro aujourd'hui vaut plus qu'un euro dans dix ans. Pourquoi ? Parce que l'euro d'aujourd'hui peut être investi et produire un rendement pendant ces dix années. C'est le principe de la 'valeur temporelle de l'argent', l'un des tout premiers concepts enseignés en finance, à la base de tous les calculs d'actualisation que vous croiserez plus loin dans ce parcours. Exemple concret : si vous placez 100€ à 5% par an, vous aurez environ 163€ dans 10 ans. Ces 100€ 'valent' donc plus aujourd'hui que dans le futur, puisqu'ils ont le temps de travailler. Erreur fréquente : croire que 1000€ promis dans 5 ans équivalent à 1000€ aujourd'hui — ce n'est jamais vrai dès qu'un taux d'intérêt existe.",
        q: "Que représente la valeur temporelle de l'argent ?",
        a: ["1€ aujourd'hui vaut plus que 1€ dans 10 ans", "1€ vaut toujours la même chose", "L'argent perd sa valeur seulement en cas de guerre", "Ça ne concerne que les banques"],
        correct: 0,
        explanationCorrect: "Exactement : un euro disponible maintenant peut être investi et produire un rendement, ce qui le rend plus précieux qu'un euro reçu plus tard. Retenez la formule intuitive : Argent aujourd'hui + Temps + Taux d'intérêt = Plus d'argent demain. C'est la notion qui justifie tout le reste (actualisation, DCF, VAN) que vous verrez plus loin.",
        explanationWrong: "Ce n'est pas la bonne réponse. Dire que '1€ vaut toujours la même chose' ignore l'effet du temps et du rendement possible : un euro aujourd'hui peut être placé et grossir, un euro futur non. Reprenons l'exemple : 100€ placés à 5% par an valent environ 163€ dans 10 ans — la vraie réponse est donc que 1€ aujourd'hui vaut plus que 1€ dans 10 ans. Ce principe s'applique à toute décision financière, pas seulement aux banques ou aux périodes de guerre.",
      },
      {
        lesson: "L'intérêt composé, c'est l'intérêt calculé non seulement sur votre capital de départ, mais aussi sur les intérêts déjà accumulés les années précédentes. C'est très différent de l'intérêt simple, calculé uniquement sur le capital initial. Exemple : avec 1000€ à 10% par an en intérêt simple, vous gagnez 100€ chaque année pendant 5 ans, soit 1500€ au total. Avec l'intérêt composé, la deuxième année vous touchez 10% sur 1100€ (pas seulement sur 1000€), et ainsi de suite : au bout de 5 ans vous avez environ 1610€. La différence grandit avec le temps — Einstein aurait qualifié ce mécanisme de 'huitième merveille du monde'. Astuce pour mieux comprendre : imaginez une boule de neige qui roule et grossit en ramassant plus de neige à chaque tour, la neige déjà collée continuant elle aussi à en ramasser.",
        q: "L'intérêt composé, c'est...",
        a: ["Un intérêt calculé uniquement sur le capital initial", "Un intérêt calculé sur le capital + les intérêts déjà accumulés", "Un intérêt fixe imposé par l'État", "Un synonyme d'inflation"],
        correct: 1,
        explanationCorrect: "C'est bien ça : l'intérêt composé se recalcule chaque période sur le capital ET sur les intérêts déjà générés, ce qui crée cet effet 'boule de neige' qui s'accélère avec le temps. Plus la durée est longue, plus l'écart avec l'intérêt simple devient spectaculaire — c'est pour cela qu'investir tôt compte tellement plus que le montant investi au départ.",
        explanationWrong: "Pas tout à fait. La première option (intérêt calculé uniquement sur le capital initial) décrit en réalité l'intérêt SIMPLE, pas le composé. L'intérêt composé, lui, recalcule aussi sur les intérêts déjà accumulés — c'est ce qui le rend si puissant sur le long terme. Et attention à ne pas confondre avec l'inflation, qui est un phénomène totalement différent : elle mesure la hausse générale des prix, pas la rémunération d'un placement.",
      },
      {
        lesson: "Le rendement 'réel' d'une épargne, c'est le rendement nominal (celui affiché par votre banque) moins l'inflation. Formule simple : Taux réel ≈ Taux nominal − Inflation. Si votre livret rapporte 2% par an, mais que l'inflation est de 4% cette année-là, votre argent perd en réalité 2% de pouvoir d'achat, même si le chiffre sur votre relevé a augmenté. C'est un piège fréquent chez les épargnants débutants : voir son solde grimper ne veut pas dire qu'on s'enrichit réellement en termes de ce qu'on peut acheter avec.",
        q: "Si l'inflation est plus élevée que le rendement de votre épargne, alors...",
        a: ["Vous gagnez du pouvoir d'achat", "Vous perdez du pouvoir d'achat", "Rien ne change", "Votre épargne double"],
        correct: 1,
        explanationCorrect: "Précisément. Même si le montant en euros augmente sur votre relevé, ces euros achètent moins de biens et services qu'avant, car les prix ont grimpé plus vite que votre épargne. C'est exactement pour cette raison que les investisseurs cherchent des rendements supérieurs à l'inflation sur le long terme — un rendement 'positif' ne suffit pas s'il reste inférieur à l'inflation.",
        explanationWrong: "Non, c'est l'inverse. Reprenons la formule : Taux réel ≈ Taux nominal − Inflation. Si l'inflation (4%) dépasse le rendement nominal (2%), le taux réel est négatif (2% − 4% = −2%) : vous perdez du pouvoir d'achat, même si votre solde en euros a grimpé. C'est un piège classique qu'il faut absolument retenir avant d'avancer dans le parcours.",
      },
      {
        lesson: "Le principe risque/rendement est le socle de toute décision d'investissement : plus le risque potentiel d'un placement est élevé, plus le rendement espéré doit l'être en compensation — sinon, personne n'accepterait de prendre ce risque plutôt qu'un placement plus sûr. C'est pour cela qu'une obligation d'État très sûre rapporte peu, alors qu'une action d'une jeune entreprise, plus risquée, peut offrir un potentiel de gain plus élevé... mais aussi de perte. Règle d'or à retenir : si on vous promet un rendement élevé garanti 'sans aucun risque', c'est presque toujours un signal d'alerte (arnaque type Ponzi, par exemple celle de Bernard Madoff).",
        q: "En finance, le principe risque/rendement dit que...",
        a: ["Un rendement élevé est toujours sans risque", "Plus le risque potentiel est élevé, plus le rendement espéré doit l'être aussi", "Le risque n'a aucun lien avec le rendement", "Il faut éviter tout risque, toujours"],
        correct: 1,
        explanationCorrect: "C'est ça : risque et rendement espéré évoluent normalement dans le même sens, c'est la logique même du marché — personne ne prendrait un risque supplémentaire pour le même rendement qu'un placement sûr. Gardez ce réflexe en tête pour la suite du parcours : chaque fois qu'un placement affiche un rendement élevé, demandez-vous quel risque il cache.",
        explanationWrong: "Ce n'est pas la bonne réponse. Un rendement élevé 'sans risque' est justement le signal d'alerte classique des arnaques financières (type Ponzi) : en réalité, plus le risque est élevé, plus le rendement espéré doit l'être pour compenser. Et éviter tout risque n'est pas réaliste non plus : même garder de l'argent liquide comporte un risque, celui de l'inflation vue à la leçon précédente.",
      },
      {
        lesson: "Toutes les dettes ne se valent pas. Une 'bonne dette' finance un actif qui génère de la valeur ou des revenus dans le temps : un prêt étudiant qui augmente votre capacité de revenu futur, un crédit immobilier locatif qui génère des loyers, ou un prêt pour développer une entreprise rentable. Une 'mauvaise dette' finance des biens qui perdent immédiatement de la valeur et ne rapportent rien, comme un crédit à la consommation pour des achats non essentiels à taux élevé. Astuce pour trancher : demandez-vous toujours 'Est-ce que ce que j'achète avec cet argent emprunté va me rapporter plus que ce qu'il me coûte en intérêts ?'",
        q: "Une 'bonne dette' sert généralement à...",
        a: ["Financer des vacances", "Financer un actif qui génère de la valeur ou des revenus (étude, immobilier locatif, entreprise)", "Acheter des produits qui perdent leur valeur immédiatement", "Payer d'autres dettes uniquement"],
        correct: 1,
        explanationCorrect: "Exactement : c'est l'usage qui distingue une bonne d'une mauvaise dette — financer un actif qui rapporte (immobilier locatif, formation, entreprise) plutôt qu'une dépense qui ne génère aucun retour futur. Retenez la question-test de la leçon : est-ce que cet emprunt va me rapporter plus qu'il ne me coûte ?",
        explanationWrong: "Pas exactement. Les vacances ou les achats de consommation financés à crédit ne créent aucune valeur future — l'argent est simplement dépensé, pas investi, ce qui en fait plutôt de la 'mauvaise dette'. La bonne réponse est de financer un actif générateur de valeur (immobilier locatif, formation, entreprise), qui rapporte davantage que son coût en intérêts.",
      },
    ],
  },
  {
    id: 1, title: "Finance personnelle", subtitle: "Budget, épargne, patrimoine",
    color: "#8AA876",
    modules: [
      {
        lesson: "Le patrimoine net, c'est la vraie photo de votre richesse à un instant donné. On le calcule ainsi : Patrimoine net = Actifs (ce que vous possédez : épargne, immobilier, placements) moins Passifs (ce que vous devez : crédits, dettes). Exemple détaillé : vous possédez un appartement de 200 000€ et avez 30 000€ d'épargne, mais il vous reste 150 000€ de crédit immobilier à rembourser. Votre patrimoine net est de 200 000 + 30 000 − 150 000 = 80 000€. Retenez bien : posséder un bien de grande valeur ne veut pas dire être riche si la dette associée est encore élevée.",
        q: "Le patrimoine net se calcule comme :",
        a: ["Revenus − Dépenses", "Actifs − Passifs", "Épargne + Salaire", "Actifs + Passifs"],
        correct: 1,
        explanationCorrect: "C'est exact : Actifs − Passifs, ce que vous possédez moins ce que vous devez. Reprenez l'exemple de la leçon si besoin : 200 000 (appartement) + 30 000 (épargne) − 150 000 (crédit restant) = 80 000€ de patrimoine net.",
        explanationWrong: "Ce n'est pas ça. 'Revenus − Dépenses' donne votre épargne mensuelle ou annuelle (un flux dans le temps), ce qui est différent du patrimoine net (une photo à un instant T). La bonne formule est Actifs − Passifs : reprenez l'exemple de la leçon, 200 000 + 30 000 − 150 000 = 80 000€.",
      },
      {
        lesson: "Un fonds d'urgence, c'est une réserve d'argent facilement disponible, généralement équivalente à 3 à 6 mois de dépenses essentielles (loyer, nourriture, factures). Son but : éviter de s'endetter à taux élevé en cas d'imprévu — perte d'emploi, panne de voiture, urgence médicale. C'est la toute première brique recommandée par la quasi-totalité des conseillers financiers, avant même de commencer à investir en bourse, car investir de l'argent dont on pourrait avoir besoin dans l'urgence oblige parfois à vendre au pire moment (quand les marchés ont justement baissé).",
        q: "Un fonds d'urgence sert à couvrir généralement :",
        a: ["1 semaine de dépenses", "3 à 6 mois de dépenses essentielles", "10 ans de dépenses", "Uniquement les impôts"],
        correct: 1,
        explanationCorrect: "Tout à fait : 3 à 6 mois de dépenses essentielles est la norme la plus largement recommandée, assez pour absorber un choc sans devoir emprunter à taux élevé ou vendre des investissements en catastrophe.",
        explanationWrong: "Non. Une semaine est nettement insuffisante face à un vrai imprévu (perte d'emploi, par exemple), et 10 ans dépasse largement l'objectif d'un fonds 'd'urgence' — ce serait alors de l'épargne de long terme. La norme retenue par la plupart des conseillers est 3 à 6 mois de dépenses essentielles.",
      },
      {
        lesson: "En France, le PEA (Plan d'Épargne en Actions) est une enveloppe fiscale qui permet d'investir en actions européennes en bénéficiant d'une fiscalité allégée sur les gains, à condition de garder le plan ouvert au moins 5 ans. C'est un outil très utilisé par les investisseurs particuliers pour la bourse à long terme, à côté du compte-titres ordinaire (plus flexible mais moins avantageux fiscalement) et de l'assurance-vie (plus orientée épargne diversifiée et transmission de patrimoine).",
        q: "Un PEA (en France) est surtout avantageux pour :",
        a: ["Les obligations d'État uniquement", "Investir en actions européennes avec une fiscalité allégée après 5 ans", "Épargner sans jamais investir", "Payer moins d'impôt sur le salaire"],
        correct: 1,
        explanationCorrect: "C'est ça : le PEA est conçu pour l'investissement en actions européennes, avec un avantage fiscal qui se déclenche après 5 ans de détention du plan.",
        explanationWrong: "Non, le PEA ne concerne pas les obligations d'État, et n'a aucun lien avec l'impôt sur le salaire (un tout autre régime fiscal). Il n'a d'intérêt que si l'on investit réellement dedans en actions européennes : c'est justement sa fiscalité allégée après 5 ans qui en fait un outil recherché par les investisseurs particuliers.",
      },
      {
        lesson: "Diversifier, c'est répartir son épargne entre plusieurs actifs différents (actions de secteurs variés, obligations, immobilier...) plutôt que de tout miser sur un seul. L'objectif n'est pas d'augmenter le rendement, mais de réduire le risque global : si un actif chute fortement, les autres peuvent compenser. C'est le sens du dicton 'ne mettez pas tous vos œufs dans le même panier', validé mathématiquement par la théorie moderne du portefeuille que nous verrons plus loin dans le parcours (niveau Gestion d'actifs).",
        q: "Pourquoi diversifier son épargne/investissement ?",
        a: ["Pour compliquer sa comptabilité", "Pour réduire le risque global en ne dépendant pas d'un seul actif", "Parce que la loi l'exige", "Ça n'a aucun intérêt réel"],
        correct: 1,
        explanationCorrect: "Exactement : la diversification réduit le risque global du portefeuille en ne dépendant pas d'un seul actif — un principe qui sera démontré mathématiquement plus loin dans votre parcours (théorie de Markowitz).",
        explanationWrong: "Non, ce n'est pas une obligation légale, c'est un choix stratégique dont l'intérêt est aujourd'hui largement démontré. Le bon objectif de la diversification est de réduire le risque global, pas de compliquer volontairement sa gestion (qui peut d'ailleurs rester simple, via un ETF diversifié en un seul produit).",
      },
      {
        lesson: "Le taux d'endettement, c'est la part de vos revenus mensuels consacrée au remboursement de crédits. Les banques utilisent couramment une limite de 33% des revenus comme référence pour accorder un nouveau crédit (comme un prêt immobilier), afin de s'assurer que l'emprunteur garde un 'reste à vivre' suffisant. Ce n'est pas une loi absolue et cela varie selon les revenus et les pays, mais c'est la norme la plus répandue dans le secteur bancaire français.",
        q: "Le taux d'endettement recommandé (grand public) ne devrait généralement pas dépasser :",

function buildSynthesisQuiz(levels, groupIndex) {
  const group = levels.slice(groupIndex * 3, groupIndex * 3 + 3);
  const modules = group.flatMap(l => l.modules.slice(0, 2));
  return {
    id: `synth-${groupIndex}`,
    title: `Examen de synthèse ${groupIndex + 1}`,
    subtitle: group.map(l => l.title).join(" · "),
    color: "#8A6FBF",
    modules,
  };
}

let _audioCtx = null;
function getAudioCtx(){ try { if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; } catch(e){ return null; } }
function playTone(freq, dur, type, delay, vol){
  const ctx = getAudioCtx(); if(!ctx) return;
  try {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type||'sine'; osc.frequency.value = freq; gain.gain.value = vol||0.08;
    osc.connect(gain); gain.connect(ctx.destination);
    const t0 = ctx.currentTime + (delay||0);
    osc.start(t0);
    gain.gain.setValueAtTime(vol||0.08, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.stop(t0+dur);
  } catch(e) {}
}
function playCorrectSound(){ if(!P.muted){ playTone(660,.12); playTone(880,.15,'sine',.1); } }
function playWrongSound(){ if(!P.muted) playTone(180,.25,'square',0,.05); }
function playLevelUpSound(){ if(P.muted) return; [523,659,784,1047].forEach((f,i)=>playTone(f,.18,'triangle',i*.1,.07)); }

function startLevel(level){
  S.activeLevel = level; S.mIndex = 0; S.stage = 'lesson'; S.selected = null;
  S.sessionScore = 0; S.scoredModules = {}; S.streak = 0; S.lessonDone = false;
  S.attempts = 0; S.lives = 5; S.bonusXP = 0; S.timeLeft = null;
  clearInterval(S.chronoTimerId);
  S.view = 'quiz';
  render();
}
function startLevelById(kind, idOrGroup){
  if (kind === 'level') startLevel(LEVELS[idOrGroup]);
  else if (kind === 'synth') startLevel(buildSynthesisQuiz(LEVELS, Number(idOrGroup)));
  else if (kind === 'interview') startLevel(INTERVIEW_LEVEL);
  else if (kind === 'case') startLevel(CASE_STUDY_LEVEL);
  else if (kind === 'revision') startRevision();
}
function goToQuestion(){
  S.stage = 'question'; S.attempts = 0;
  if (P.chronoMode) startChronoTimer(20); else S.timeLeft = null;
  render();
}
function startChronoTimer(seconds){
  S.timeLeft = seconds;
  clearInterval(S.chronoTimerId);
  S.chronoTimerId = setInterval(() => {
    S.timeLeft -= 1;
    if (S.timeLeft <= 0) {
      clearInterval(S.chronoTimerId);
      answer(-1);
      return;
    }
    const el = document.getElementById('chronoNum');
    const fill = document.getElementById('chronoFill');
    if (el) el.textContent = S.timeLeft + 's';
    if (fill) fill.style.width = (S.timeLeft/20*100) + '%';
  }, 1000);
}
function reviewLesson(){
  clearInterval(S.chronoTimerId);
  S.stage = 'lesson'; S.selected = null; S.lessonDone = false;
  render();
}
function retryQuestion(){
  S.stage = 'question'; S.selected = null;
  if (P.chronoMode) startChronoTimer(20);
  render();
}
function restartLevel(){ startLevel(S.activeLevel); }
function quitToMap(){ clearInterval(S.chronoTimerId); S.view = 'map'; render(); }

function answer(i){
  if (S.selected !== null) return;
  clearInterval(S.chronoTimerId);
  S.selected = i;
  const m = S.activeLevel.modules[S.mIndex];
  S.attempts += 1;
  const isCorrect = i === m.correct;
  if (isCorrect) {
    if (!S.scoredModules[S.mIndex]) { S.sessionScore += 1; S.scoredModules[S.mIndex] = true; }
    S.streak += 1;
    playCorrectSound();
    if (P.chronoMode && S.timeLeft !== null && S.timeLeft >= 10) S.bonusXP += 5;
    if (typeof S.activeLevel.id === 'number') {
      P.missedQueue = (P.missedQueue||[]).filter(it => !(it.levelId===S.activeLevel.id && it.moduleIndex===S.mIndex));
      saveProgress();
    }
  } else {
    S.streak = 0;
    S.lives = Math.max(0, S.lives - 1);
    playWrongSound();
    if (typeof S.activeLevel.id === 'number') {
      const exists = (P.missedQueue||[]).some(it => it.levelId===S.activeLevel.id && it.moduleIndex===S.mIndex);
      if (!exists) { P.missedQueue = [...(P.missedQueue||[]), { levelId: S.activeLevel.id, moduleIndex: S.mIndex }]; saveProgress(); }
    }
  }
  S.stage = 'explain';
  render();
}

function nextModule(){
  const isLast = S.mIndex === S.activeLevel.modules.length - 1;
  if (!isLast) {
    S.mIndex += 1; S.stage = 'lesson'; S.selected = null; S.lessonDone = false; S.attempts = 0; S.timeLeft = null;
    render();
    return;
  }
  const finalScore = S.sessionScore;
  const total = S.activeLevel.modules.length;
  const passed = finalScore/total >= 0.6;
  const earnedXP = finalScore*10 + (passed?20:0) + S.bonusXP;

  const nextCompleted = { ...P.completed };
  const prevBest = nextCompleted[S.activeLevel.id]?.score || 0;
  nextCompleted[S.activeLevel.id] = { score: Math.max(prevBest, finalScore), total, passed: passed || nextCompleted[S.activeLevel.id]?.passed };

  if (passed && typeof S.activeLevel.id === 'number') {
    P.unlocked = Math.max(P.unlocked, Math.min(S.activeLevel.id + 2, LEVELS.length));
  }
  if (S.activeLevel.id === 'revision') {
    P.missedQueue = (P.missedQueue||[]).filter((_, idx) => !S.scoredModules[idx]);
  }
  P.completed = nextCompleted;
  P.xp = P.xp + earnedXP;
  saveProgress();

  if (passed) { fireConfetti(); playLevelUpSound(); }
  S.view = 'result';
  render();
}

            <div class="fq-brand-name">${esc(P.profile.pseudo || 'Finance Quest')}</div>
            <div class="fq-brand-sub" id="logoTapSub">${league.icon} ${league.label} · ${P.xp} XP</div>
          </div>
        </div>
        <div class="fq-header-icons">
          <button class="fq-icon-btn ${P.chronoMode?'active':''}" data-action="toggleChrono" title="Mode chrono">⚡</button>
          <button class="fq-icon-btn" data-action="toggleMuted" title="Son">${P.muted?'🔇':'🔊'}</button>
          <button class="fq-icon-btn" data-action="toggleTheme" title="Thème">${P.theme==='dark'?'☀️':'🌙'}</button>
          <button class="fq-icon-btn ${S.view==='settings'?'active':''}" data-action="setView" data-view="settings" title="Réglages">⚙️</button>
        </div>
      </div>
      <nav class="fq-nav">
        ${tabs.map(([v,icon,label]) => `<button class="fq-navbtn ${S.view===v?'active':''}" data-action="setView" data-view="${v}">${icon} ${label}</button>`).join('')}
      </nav>
    </div>`;
}

function renderFooter(){
  return `<div class="fq-footer"><button class="fq-reset-link" data-action="resetProgress">Réinitialiser ma progression</button></div>`;
}

function renderBody(){
  switch (S.view) {
    case 'map': return renderMap();
    case 'quiz': return renderQuiz();
    case 'result': return renderResult();
    case 'formulas': return renderFormulas();
    case 'glossary': return renderGlossary();
    case 'flashcards': return renderFlashcards();
    case 'progression': return renderProgression();
    case 'revision': return renderRevision();
    case 'settings': return renderSettings();
    case 'admin': return renderAdmin();
    case 'news': return renderNews();
    default: return renderMap();
  }
}

/* ============================ MAP ============================ */

function renderMap(){
  if (!P.profile.pseudo) return renderOnboarding();

  const groupsUnlocked = [0,1,2,3].filter(g => [g*3,g*3+1,g*3+2].every(id => P.completed[id]?.passed));
  const interviewUnlocked = !!P.completed[8]?.passed;
  const allPassed = LEVELS.every(l => P.completed[l.id]?.passed);

  let html = renderDailyChallenge();
  html += `<div class="fq-intro">📘 <p>Chaque niveau enseigne d'abord, puis vérifie avec une question. Réussis un niveau (60%+) pour débloquer le suivant.</p></div>`;
  html += `<div>`;
  LEVELS.forEach((lvl, idx) => {
    const locked = idx >= P.unlocked;
    const info = P.completed[lvl.id];
    const icon = locked ? '🔒' : (info?.passed ? '✓' : LEVEL_ICONS[idx]);
    html += `
      <button class="fq-level" ${locked?'disabled':''} data-action="startLevel" data-kind="level" data-id="${idx}" style="border-color:${locked?'var(--border)':lvl.color}; opacity:${locked?0.5:1};">
        <div class="fq-level-num" style="background:${locked?'var(--border)':lvl.color};">${icon}</div>
        <div style="flex:1;">
          <div class="fq-level-title">${esc(lvl.title)}</div>
          <div class="fq-level-sub">${esc(lvl.subtitle)}</div>
        </div>
        ${info ? `<div class="fq-level-score">${info.score}/${info.total}</div>` : ''}
        ${!locked ? '<span style="color:var(--dim);">›</span>' : ''}
      </button>`;
  });
  html += `</div>`;

  if (groupsUnlocked.length > 0) {
    html += `<div style="margin-top:16px;"><div class="fq-cat-title">Examens de synthèse</div>`;
    groupsUnlocked.forEach(g => {
      const quiz = buildSynthesisQuiz(LEVELS, g);
      html += `<button class="fq-level" data-action="startLevel" data-kind="synth" data-id="${g}" style="border-color:${quiz.color};">
        🏅 <div style="flex:1;"><div class="fq-level-title">${esc(quiz.title)}</div><div class="fq-level-sub">${esc(quiz.subtitle)}</div></div>›</button>`;
    });
    html += `</div>`;
  }
  if (interviewUnlocked) {
    html += `<div style="margin-top:16px;"><div class="fq-cat-title">Mode pro</div>`;
    html += `<button class="fq-level" data-action="startLevel" data-kind="interview" style="border-color:${INTERVIEW_LEVEL.color};">
      💼 <div style="flex:1;"><div class="fq-level-title">${esc(INTERVIEW_LEVEL.title)}</div><div class="fq-level-sub">${esc(INTERVIEW_LEVEL.subtitle)}</div></div>›</button>`;
    if (allPassed) {
      html += `<button class="fq-level" data-action="startLevel" data-kind="case" style="border-color:${CASE_STUDY_LEVEL.color};">
        📁 <div style="flex:1;"><div class="fq-level-title">${esc(CASE_STUDY_LEVEL.title)}</div><div class="fq-level-sub">${esc(CASE_STUDY_LEVEL.subtitle)}</div></div>›</button>`;
    }
    html += `</div>`;
  }
  return html;
}

function renderOnboarding(){
  return `
    <div class="fq-card">
      <div style="font-size:17px;font-weight:bold;margin-bottom:4px;">${getGreeting()} 👋</div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:12px;">Comment veux-tu qu'on t'appelle sur ton parcours ?</div>
      <input id="pseudoInput" class="fq-input" placeholder="Ton prénom ou pseudo" maxlength="20">
      <div class="fq-avatar-row">
        ${AVATARS.map((a,i) => `<button type="button" class="fq-avatar-btn ${i===0?'active':''}" data-avatar="${a}" data-action="pickAvatar">${a}</button>`).join('')}
      </div>
      <button class="fq-btn-primary" data-action="saveProfile">Commencer l'aventure ›</button>
    </div>`;
}

function renderDailyChallenge(){
  const today = todayStr();
  const alreadyDone = P.daily.date === today && P.daily.doneToday;
  const pool = LEVELS.slice(0, P.unlocked).flatMap(l => l.modules);
  if (pool.length === 0) return '';
  const idx = hashStr(today) % pool.length;
  const q = pool[idx];
  let inner;
  if (alreadyDone) {
    inner = `<div style="font-size:12px;color:var(--dim);font-style:italic;">Défi relevé pour aujourd'hui — reviens demain pour continuer ta série !</div>`;
  } else {
    inner = `
      <div style="font-size:13px;margin-bottom:10px;line-height:1.4;">${esc(q.q)}</div>
      <div class="fq-answers" id="dailyAnswers">
        ${q.a.map((opt,i) => `<button class="fq-answer" data-action="dailyAnswer" data-i="${i}" data-correct="${q.correct}">${esc(opt)}</button>`).join('')}
      </div>
      <div id="dailyResultMsg" style="font-size:11px;color:var(--dim);margin-top:8px;font-style:italic;"></div>`;
  }
  return `
    <div class="fq-daily">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:bold;margin-bottom:10px;">
        🔥 Défi du jour <span id="dailyStreakLabel" style="margin-left:auto;font-size:11px;color:var(--dim);font-weight:normal;">🔥 ${P.daily.streak} jour${P.daily.streak>1?'s':''}</span>
      </div>
      ${inner}
    </div>`;
}
function renderDailyResult(correct){
  const el = document.getElementById('dailyResultMsg');
  if (el) el.textContent = correct ? '+15 XP — bien joué !' : '+3 XP quand même, reviens demain pour ta série.';
  document.querySelectorAll('#dailyAnswers .fq-answer').forEach(b => {
    b.disabled = true;
    const i = Number(b.dataset.i), c = Number(b.dataset.correct);
    if (i === c) b.classList.add('correct');
  });
}

/* ============================ QUIZ ============================ */

function renderQuiz(){
  const level = S.activeLevel;
  const m = level.modules[S.mIndex];
  const pct = (S.mIndex / level.modules.length) * 100;
  const isCorrect = S.selected === m.correct;
  const outOfLives = S.lives <= 0 && S.stage === 'explain' && !isCorrect;

  let livesHtml = '<div class="fq-lives">';
  for (let i=0;i<5;i++) livesHtml += `<span style="color:${i<S.lives?'#B85C5C':'var(--border)'};">${i<S.lives?'❤️':'🖤'}</span>`;
  livesHtml += '</div>';

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;">
      <button data-action="quitToMap" style="display:flex;align-items:center;gap:4px;background:transparent;border:none;color:var(--dim);font-size:12px;cursor:pointer;">✕ Quitter</button>
      ${livesHtml}
      ${S.streak>=2 ? `<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#F59E0B;">🔥 ${S.streak}</div>` : ''}
    </div>
    <div class="fq-progress-track"><div class="fq-progress-fill" style="width:${pct}%;background:${level.color};"></div></div>
    <div style="font-size:11px;color:var(--dim);margin:8px 0 12px;font-style:italic;">${esc(level.title)} · ${S.mIndex+1}/${level.modules.length}</div>`;

  if (S.stage === 'lesson') {
    html += `
      <div class="fq-card">
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px;">🎓 Leçon — ton professeur particulier</div>
        <div id="lessonText" style="font-size:13.5px;line-height:1.65;color:var(--soft);min-height:90px;white-space:pre-line;cursor:pointer;"></div>
        <button id="lessonContinueBtn" class="fq-btn-primary" style="background:${level.color};opacity:.4;cursor:not-allowed;" disabled data-action="goToQuestion">J'ai compris, passer à la question ›</button>
      </div>`;
  } else {
    html += `<div class="fq-card">`;
    if (P.chronoMode && S.stage === 'question' && S.timeLeft !== null) {
      html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">⚡<div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;"><div id="chronoFill" style="height:100%;background:#F59E0B;width:${(S.timeLeft/20*100)}%;"></div></div><span id="chronoNum" style="font-size:10px;color:var(--dim);font-family:monospace;">${S.timeLeft}s</span></div>`;
    }
    html += `<div style="font-size:15px;line-height:1.5;margin-bottom:14px;">${esc(m.q)}</div><div class="fq-answers">`;
    m.a.forEach((opt, i) => {
      let cls = 'fq-answer';
      if (S.selected !== null) {
        if (i === m.correct) cls += ' correct';
        else if (i === S.selected) cls += ' wrong';
      }
      html += `<button class="${cls}" ${S.selected!==null?'disabled':''} data-action="answer" data-i="${i}">${esc(opt)} ${S.selected!==null && i===m.correct?'✓':''}${S.selected!==null && i===S.selected && i!==m.correct?'✗':''}</button>`;
    });
    html += `</div>`;

    if (S.stage === 'explain') {
      html += `<div style="font-size:12px;font-weight:bold;margin-top:14px;color:${isCorrect?'#8AA876':'#D08080'};">${isCorrect?'✓ Bonne réponse':(S.selected===-1?'⏱ Temps écoulé':'✗ Pas tout à fait')}</div>`;
      html += `<div style="display:flex;gap:8px;align-items:flex-start;margin-top:8px;font-size:12px;color:var(--soft);line-height:1.6;">🎓 <span>${esc(isCorrect ? m.explanationCorrect : m.explanationWrong)}</span></div>`;

      if (isCorrect) {
        html += `<button class="fq-btn-primary" style="background:${level.color};" data-action="nextModule">${S.mIndex===level.modules.length-1?'Voir le résultat':'Leçon suivante'} ›</button>`;
      } else if (outOfLives) {
        html += `<div style="text-align:center;margin-top:10px;">
          <div style="font-size:13px;font-weight:bold;color:#B85C5C;">Plus de vies pour ce niveau</div>
          <div style="font-size:11px;color:var(--dim);margin:4px 0;">Pas grave — reprends depuis les leçons, ça va se fixer.</div>
          <button class="fq-btn-primary" style="background:${level.color};" data-action="restartLevel">↻ Recommencer le niveau</button>
        </div>`;
      } else {
        if (S.attempts >= 2) {
          html += `<div style="font-size:11px;color:var(--dim);font-style:italic;line-height:1.5;margin-top:10px;border-left:2px solid var(--gold);padding-left:8px;">Cette notion résiste un peu — relis la leçon tranquillement, l'exemple concret aide souvent à faire "clic".</div>`;
        }
        html += `<div style="display:flex;gap:8px;margin-top:14px;">
          <button class="fq-btn-secondary" data-action="reviewLesson">📘 Revoir la leçon</button>
          <button class="fq-btn-primary" style="background:${level.color};margin-top:0;flex:1;" data-action="retryQuestion">↻ Réessayer</button>
        </div>`;
      }
    }
    html += `</div>`;
  }
  return html;
}

function renderResult(){
  const level = S.activeLevel;
  const info = P.completed[level.id];
  const score = info?.score ?? S.sessionScore;
  const total = level.modules.length;
  const passed = info?.passed;
  const pct = Math.round((score/total)*100);
  return `
    <div style="padding:14px 0;display:flex;flex-direction:column;align-items:center;text-align:center;">
      <div style="width:110px;height:110px;border-radius:50%;border:3px solid ${level.color};display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;">
        <div style="font-size:24px;font-weight:bold;font-family:monospace;">${pct}%</div>
        <div style="font-size:11px;color:var(--dim);">${score}/${total}</div>
      </div>
      <div style="font-size:17px;font-weight:bold;margin-bottom:6px;">${passed?'Niveau validé !':'Pas encore validé'}</div>
      <div style="font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:20px;max-width:320px;">
        ${passed ? "Le niveau suivant est débloqué. Continue sur ta lancée." : `Il faut au moins 60% pour débloquer la suite de "${esc(level.title)}". Relis bien les leçons et retente ta chance.`}
      </div>
      <div style="display:flex;gap:8px;width:100%;">
        <button class="fq-btn-secondary" data-action="restartLevel">↻ Recommencer</button>
        <button class="fq-btn-primary" style="background:${level.color};margin-top:0;" data-action="setView" data-view="map">Retour au parcours ›</button>
      </div>
    </div>`;
}

function startTypingLesson(){
  const level = S.activeLevel;
  const m = level.modules[S.mIndex];
  const text = m.lesson;
  clearInterval(S.typeTimerId);
  const el = document.getElementById('lessonText');
  const btn = document.getElementById('lessonContinueBtn');
  if (!el) return;
  let idx = 0;
  el.textContent = '';
  const finish = () => {
    clearInterval(S.typeTimerId);
    el.textContent = text;
    S.lessonDone = true;
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
  };
  el.onclick = finish;
  S.typeTimerId = setInterval(() => {
    idx += 2;
    el.textContent = text.slice(0, idx);
    if (idx >= text.length) finish();
  }, 16);
}

/* ============================ FORMULES / GLOSSAIRE / CARTES ============================ */

function renderFormulas(){
  const cats = [...new Set(FORMULAS.map(f=>f.cat))];
  let html = `<div class="fq-intro">🧮 <p>Le classeur de formules.</p></div>`;
  cats.forEach(cat => {
    html += `<div class="fq-cat-title">${esc(cat)}</div>`;
    FORMULAS.filter(f=>f.cat===cat).forEach(f => {
      html += `<div class="fq-formula-row"><div class="fq-formula-name">${esc(f.name)}</div><div class="fq-formula-expr">${esc(f.formula)}</div></div>`;
    });
  });
  return html;
}

function renderGlossary(){
  return `
    <div class="fq-intro">🔎 <p>Cherche un terme financier pour sa définition simple.</p></div>
    <input id="glossarySearch" class="fq-input" placeholder="Rechercher un terme…" value="${esc(S.glossaryQuery)}">
    <div id="glossaryList">${glossaryListHtml()}</div>`;
}
function glossaryListHtml(){
  const q = S.glossaryQuery.toLowerCase();
  const filtered = GLOSSARY.filter(g => g.term.toLowerCase().includes(q));
  if (filtered.length === 0) return `<div style="font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:20px 0;">Aucun terme trouvé.</div>`;
  return filtered.map(g => `<div class="fq-glossary-row"><div style="font-size:13px;font-weight:bold;color:var(--gold);margin-bottom:3px;">${esc(g.term)}</div><div style="font-size:12px;color:var(--soft);line-height:1.4;">${esc(g.def)}</div></div>`).join('');
}

function renderFlashcards(){
  const cards = [
    ...FORMULAS.map(f => ({ front: f.name, back: f.formula, tag: f.cat })),
    ...GLOSSARY.map(g => ({ front: g.term, back: g.def, tag: 'Glossaire' })),
  ];
  const card = cards[S.flashIdx % cards.length];
  return `
    <div class="fq-intro">🗂️ <p>Tape la carte pour la retourner.</p></div>
    <div style="font-size:11px;color:var(--dim);text-align:center;margin-bottom:10px;">${(S.flashIdx%cards.length)+1} / ${cards.length} · ${esc(card.tag)}</div>
    <div class="fq-flash" id="flashCard" data-action="flipFlash">
      <div style="font-size:15px;font-weight:bold;line-height:1.5;">${S.flashFlipped ? esc(card.back) : esc(card.front)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:10px;font-style:italic;">${S.flashFlipped ? '' : 'toucher pour révéler'}</div>
    </div>
    <div style="display:flex;justify-content:center;gap:10px;margin-top:14px;">
      <button class="fq-btn-secondary" style="flex:0;padding:11px 16px;" data-action="flashNav" data-dir="-1">‹</button>
      <button class="fq-btn-secondary" style="flex:0;padding:11px 16px;" data-action="flashNav" data-dir="1">›</button>
    </div>`;
}

/* ============================ PROGRESSION / RÉVISION ============================ */

function renderProgression(){
  const league = getLeague(P.xp);
  const data = LEVELS.map(l => ({
    name: l.title.length > 8 ? l.title.slice(0,7)+'…' : l.title,
    pct: P.completed[l.id] ? Math.round((P.completed[l.id].score/P.completed[l.id].total)*100) : 0,
  }));
  const done = data.filter(d => d.pct > 0);
  const weakest = done.length ? [...done].sort((a,b)=>a.pct-b.pct)[0] : null;
  const strongest = done.length ? [...done].sort((a,b)=>b.pct-a.pct)[0] : null;
  const maxPct = Math.max(...data.map(d=>d.pct), 10);

  let chart = `<div class="fq-chart">`;
  data.forEach(d => {
    chart += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="width:100%;display:flex;align-items:flex-end;height:100px;">
        <div class="fq-chart-bar" style="height:${(d.pct/maxPct)*100}%;"></div>
      </div>
      <div class="fq-chart-label">${esc(d.name)}</div>
    </div>`;
  });
  chart += `</div>`;

  return `
    <div class="fq-intro">📊 <p>Ta progression, niveau par niveau.</p></div>
    <div class="fq-card" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <span style="font-size:24px;">${league.icon}</span>
      <div><div class="fq-level-title">Ligue ${league.label}</div><div class="fq-level-sub">${P.xp} XP au total · série de ${P.daily.streak} jour${P.daily.streak>1?'s':''}</div></div>
    </div>
    <div class="fq-card" style="margin-bottom:12px;">${chart}</div>
    ${strongest ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--soft);margin-bottom:8px;">🏅 Point fort : <b>${esc(strongest.name)}</b> (${strongest.pct}%)</div>` : ''}
    ${weakest && weakest.pct<80 ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--soft);margin-bottom:8px;">🔁 À retravailler : <b>${esc(weakest.name)}</b> (${weakest.pct}%)</div>` : ''}
  `;
}

function renderRevision(){
  const count = (P.missedQueue||[]).length;
  if (count === 0) {
    return `<div class="fq-intro">🔁 <p>Les questions ratées reviennent ici pour être fixées.</p></div>
      <div style="font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:20px 0;">Aucune erreur en attente — beau travail !</div>`;
  }
  return `
    <div class="fq-intro">🔁 <p>Les questions ratées reviennent ici pour être fixées.</p></div>
    <div class="fq-card">
      <div class="fq-level-title">${count} question${count>1?'s':''} à revoir</div>
      <div class="fq-level-sub">Une petite session ciblée pour bien ancrer ces notions.</div>
      <button class="fq-btn-primary" data-action="startLevel" data-kind="revision">Réviser mes erreurs ›</button>
    </div>`;
}

    </div>`;
}

/* ============================ ADMIN (local à cet appareil) ============================ */

function renderAdmin(){
  const visits = P.visits || {};
  const pseudos = Object.keys(visits);
  const totalUsers = pseudos.length;
  const returning = pseudos.filter(p => visits[p].length > 1).length;
  const byDay = {};
  pseudos.forEach(p => visits[p].forEach(d => { byDay[d] = (byDay[d]||0)+1; }));
  const days = Object.keys(byDay).sort().slice(-7);
  const maxV = Math.max(...days.map(d=>byDay[d]), 1);

  let chart = `<div class="fq-chart">`;
  days.forEach(d => {
    chart += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="width:100%;display:flex;align-items:flex-end;height:100px;"><div class="fq-chart-bar" style="height:${(byDay[d]/maxV)*100}%;"></div></div>
      <div class="fq-chart-label">${d.slice(5)}</div>
    </div>`;
  });
  chart += `</div>`;

  let userRows = pseudos.sort((a,b)=>visits[b].length-visits[a].length)
    .map(p => `<div class="fq-formula-row"><div class="fq-formula-name">${esc(p)}</div><div class="fq-formula-expr">${visits[p].length} jour${visits[p].length>1?'s':''}</div></div>`).join('');

  return `
    <div class="fq-intro">📊 <p>Fréquentation locale à cet appareil.</p></div>
    <div style="font-size:11px;color:var(--dim);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;">
      ⚠️ Cette version autonome (fichier HTML) n'a pas de serveur central : ces statistiques ne comptent que les profils créés <b>sur ce navigateur/appareil précis</b>. Pour suivre plusieurs testeurs sur leurs propres appareils, il faudrait un vrai backend partagé.
    </div>
    <div class="fq-card" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      👥 <div><div class="fq-level-title">${totalUsers} profil${totalUsers>1?'s':''} sur cet appareil</div><div class="fq-level-sub">${returning} revenu${returning>1?'s':''} au moins un 2ᵉ jour</div></div>
    </div>
    <div class="fq-card" style="margin-bottom:12px;">${days.length ? chart : '<div style="font-size:12px;color:var(--dim);text-align:center;">Pas encore de données.</div>'}</div>
    <div class="fq-cat-title">Détail</div>
    ${userRows || "<div style=\"font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:10px 0;\">Aucune visite enregistrée pour l'instant.</div>"}
    <button class="fq-btn-secondary" style="margin-top:16px;" data-action="setView" data-view="map">Retour au parcours</button>`;
}

/* ============================ ACTUALITÉS ============================ */

function renderNews(){
  const allComplete = Object.keys(P.completed).filter(k => P.completed[k].passed).length >= LEVELS.length;
  let html = `<div class="fq-intro">📰 <p>Suivi des marchés en continu</p></div>`;
  if (!allComplete) {
    html += `<div class="fq-card" style="display:flex;gap:10px;margin-bottom:14px;">🔒
      <div><div style="font-size:13px;font-weight:bold;">Débloqué au niveau 11 terminé</div>
      <div style="font-size:11px;color:var(--dim);line-height:1.5;">Termine d'abord tout le parcours — l'actu n'a de sens que si tu peux déjà l'analyser toi-même.</div></div></div>`;
  }
  html += `<div style="opacity:${allComplete?1:0.35};pointer-events:${allComplete?'auto':'none'};">`;
  NEWS_SAMPLE.forEach(n => {
    html += `<div class="fq-card" style="margin-bottom:8px;">
      <span style="font-size:10px;color:var(--gold);font-family:monospace;text-transform:uppercase;">${esc(n.tag)}</span>
      <p style="font-size:12px;color:var(--soft);margin-top:4px;line-height:1.5;">${esc(n.text)}</p>
      <div style="display:flex;gap:6px;align-items:flex-start;margin-top:8px;font-size:11px;color:var(--dim);line-height:1.5;font-style:italic;">🎓 <span>${esc(n.explain)}</span></div>
    </div>`;
  });
  html += `<div style="font-size:11px;color:var(--dim);font-style:italic;line-height:1.5;margin-top:8px;">Note honnête : ce flux est illustratif dans cette maquette.</div></div>`;
  return html;
}

/* ============================ ÉVÉNEMENTS ============================ */

function attachGlobalHandlers(){
  const logo = document.getElementById('logoTapZone');
  if (logo) logo.onclick = logoTap;

  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    if (el._bound) return;
    el._bound = true;
    el.addEventListener('click', (e) => {
      switch (action) {
        case 'setView': setView(el.dataset.view); break;
        case 'toggleChrono': toggleChrono(); break;
        case 'toggleMuted': toggleMuted(); break;
        case 'toggleTheme': toggleTheme(); break;
        case 'resetProgress': resetProgress(); break;
        case 'startLevel': startLevelById(el.dataset.kind, el.dataset.id); break;
        case 'pickAvatar': pickAvatar(el.dataset.avatar); break;
        case 'saveProfile': saveProfile(); break;
        case 'quitToMap': quitToMap(); break;
        case 'goToQuestion': goToQuestion(); break;
        case 'answer': answer(Number(el.dataset.i)); break;
        case 'nextModule': nextModule(); break;
        case 'restartLevel': restartLevel(); break;
        case 'reviewLesson': reviewLesson(); break;
        case 'retryQuestion': retryQuestion(); break;
        case 'setFont': setFont(el.dataset.font); break;
        case 'flipFlash': S.flashFlipped = !S.flashFlipped; render(); break;
        case 'flashNav': S.flashFlipped = false; S.flashIdx = (S.flashIdx + Number(el.dataset.dir) + 999999) % 999999; render(); break;
        case 'dailyAnswer': {
          const i = Number(el.dataset.i), c = Number(el.dataset.correct);
          completeDailyChallenge(i === c, i);
          break;
        }
      }
    });
  });
}

function attachViewHandlers(){
  if (S.view === 'quiz' && S.stage === 'lesson') startTypingLesson();
  if (S.view === 'glossary') {
    const input = document.getElementById('glossarySearch');
    if (input) {
      input.focus();
      input.selectionStart = input.selectionEnd = input.value.length;
      input.oninput = (e) => {
        S.glossaryQuery = e.target.value;
        document.getElementById('glossaryList').innerHTML = glossaryListHtml();
      };
    }
  }
}

/* ============================ INITIALISATION ============================ */
render();
</script>

</html>
