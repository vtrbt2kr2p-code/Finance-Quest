<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finara</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0E1420">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finara">
<style>
  :root {
    --bg: #0E1420; --card: #161C29; --card2: #1E2534; --border: #23293A;
    --text: #EDEBE3; --dim: #8A8FA0; --soft: #B4B8C4; --gold: #D4AF37;
  }
  [data-theme="light"] {
    --bg: #F6F2E7; --card: #FFFFFF; --card2: #F0ECDD; --border: #E4DEC9;
    --text: #20242C; --dim: #6E7280; --soft: #4B4F58; --gold: #D4AF37;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #05070C; }
  body { display: flex; justify-content: center; padding: 20px 10px; min-height: 100vh; }
  #app {
    font-family: var(--app-font, 'Georgia','Times New Roman',serif);
    background: var(--bg); color: var(--text);
    width: 100%; max-width: 480px; min-height: 640px;
    border-radius: 18px; overflow: hidden; border: 1px solid var(--border);
    position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  button { font-family: inherit; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
  @keyframes confettiFall { 0% { transform: translateY(0) rotate(0); opacity:1 } 100% { transform: translateY(420px) rotate(360deg); opacity:0 } }
  .fq-header { padding: 18px 18px 0; border-bottom: 1px solid var(--border); }
  .fq-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .fq-brand { display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
  .fq-brand-mark { width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#D4AF37,#8A6D1E);color:#0E1420;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:16px; }
  .fq-brand-name { font-size:15px; font-weight:bold; }
  .fq-brand-sub { font-size:11px; color:var(--dim); font-style:italic; }
  .fq-header-icons { display:flex; gap:6px; }
  .fq-icon-btn { width:28px;height:28px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px; }
  .fq-icon-btn.active { color:var(--gold); border-color:var(--gold); }
  .fq-nav { display:flex; gap:2px; padding-bottom:8px; overflow-x:auto; }
  .fq-navbtn { display:flex;align-items:center;gap:4px;background:transparent;border:none;color:var(--dim);font-size:10.5px;padding:6px 8px;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap;flex-shrink:0; }
  .fq-navbtn.active { color: var(--gold); border-bottom:2px solid var(--gold); }
  .fq-body { padding: 16px 18px; max-height: 560px; overflow-y:auto; }
  .fq-intro { display:flex; gap:8px; align-items:flex-start; font-size:12px; color:var(--soft); margin-bottom:14px; line-height:1.5; }
  .fq-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .fq-level { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid; border-radius:12px; padding:10px 12px; margin-bottom:8px; cursor:pointer; width:100%; text-align:left; }
  .fq-path { display:flex; flex-direction:column; }
  .fq-path-item { display:flex; align-items:stretch; gap:12px; }
  .fq-path-line-wrap { display:flex; flex-direction:column; align-items:center; width:36px; flex-shrink:0; }
  .fq-path-line { width:3px; flex:1; min-height:10px; }
  .fq-path-node { width:36px; height:36px; border-radius:50%; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; flex-shrink:0; }
  .fq-path-current { box-shadow:0 0 0 4px rgba(212,175,55,0.25); animation: pathPulse 1.8s ease-in-out infinite; }
  @keyframes pathPulse { 0%,100% { box-shadow:0 0 0 4px rgba(212,175,55,0.25); } 50% { box-shadow:0 0 0 8px rgba(212,175,55,0.12); } }
  .fq-path-content { flex:1; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:14px; text-align:left; cursor:pointer; }
  .fq-path-content[disabled] { cursor:not-allowed; }
  .fq-drawer-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0); pointer-events:none; transition:background .25s ease; z-index:90; }
  .fq-drawer-backdrop.open { background:rgba(0,0,0,0.5); pointer-events:auto; }
  .fq-drawer { position:absolute; top:0; right:0; width:78%; max-width:300px; height:100%; background:var(--card); border-left:1px solid var(--border); transform:translateX(100%); transition:transform .28s ease; z-index:91; display:flex; flex-direction:column; box-shadow:-8px 0 24px rgba(0,0,0,0.25); }
  .fq-drawer.open { transform:translateX(0); }
  .fq-drawer-head { display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid var(--border); }
  .fq-drawer-items { display:flex; flex-direction:column; padding:8px; overflow-y:auto; flex:1; }
  .fq-drawer-item { text-align:left; background:transparent; border:none; color:var(--text); padding:12px 10px; border-radius:8px; font-size:13px; cursor:pointer; }
  .fq-drawer-item.active { background:var(--card2); color:var(--gold); font-weight:bold; }
  .fq-drawer-lang { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-top:1px solid var(--border); }
  .fq-lang-btn { background:var(--card2); border:1px solid var(--border); color:var(--dim); padding:5px 10px; border-radius:6px; font-size:11px; cursor:pointer; }
  .fq-lang-btn.active { color:var(--gold); border-color:var(--gold); }
  .fq-level[disabled] { opacity:.5; cursor:not-allowed; }
  .fq-level-num { width:28px;height:28px;border-radius:50%;color:#0E1420;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0; }
  .fq-level-title { font-size:14px; font-weight:bold; }
  .fq-level-sub { font-size:11px; color:var(--dim); font-style:italic; }
  .fq-level-score { font-size:11px; font-family:monospace; color:var(--dim); }
  .fq-btn-primary { display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border:none;color:#0E1420;font-weight:bold;padding:11px;border-radius:10px;margin-top:14px;cursor:pointer;font-size:13px;background:linear-gradient(135deg,#D4AF37,#B8942E); }
  .fq-btn-secondary { display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--text);padding:11px;border-radius:10px;cursor:pointer;font-size:13px;flex:1; }
  .fq-answers { display:flex; flex-direction:column; gap:8px; }
  .fq-answer { display:flex;justify-content:space-between;align-items:center;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-size:13px;text-align:left;cursor:pointer; }
  .fq-answer.correct { background:rgba(138,168,118,0.18); border-color:#8AA876; }
  .fq-answer.wrong { background:rgba(184,92,92,0.18); border-color:#B85C5C; }
  .fq-progress-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .fq-progress-fill { height:100%; transition:width .3s ease; }
  .fq-lives { display:flex; gap:2px; }
  .fq-input { width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-size:13px; margin-bottom:12px; font-family:inherit; }
  .fq-avatar-row { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .fq-avatar-btn { width:38px;height:38px;border-radius:10px;font-size:18px;background:var(--card2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .fq-avatar-btn.active { border-color:var(--gold); background:rgba(212,175,55,0.15); }
  .fq-formula-row, .fq-glossary-row { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .fq-glossary-row { display:block; }
  .fq-formula-name { font-size:12px; color:var(--text); }
  .fq-formula-expr { font-size:12px; font-family:monospace; color:var(--gold); text-align:right; }
  .fq-cat-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); margin:14px 0 6px; }
  .fq-flash { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:30px 18px; min-height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:pointer; }
  .fq-footer { padding:8px 18px 16px; text-align:center; }
  .fq-reset-link { background:transparent; border:none; color:var(--dim); font-size:10px; cursor:pointer; opacity:.6; }
  .fq-splash { min-height:640px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; }
  .fq-splash-logo { width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#D4AF37,#8A6D1E);color:#0E1420;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:26px;margin-bottom:18px; box-shadow:0 8px 24px rgba(212,175,55,.35); }
  .fq-chart { display:flex; align-items:flex-end; gap:6px; height:120px; padding:10px 0; }
  .fq-chart-bar { flex:1; background:var(--gold); border-radius:4px 4px 0 0; min-height:2px; display:flex; align-items:flex-end; justify-content:center; }
  .fq-chart-label { font-size:9px; color:var(--dim); text-align:center; margin-top:4px; }
  .fq-daily { background:var(--card); border:1px solid #F59E0B44; border-radius:14px; padding:14px; margin-bottom:16px; }
  .fq-toggle-row { display:flex; justify-content:space-between; align-items:center; font-size:13px; margin-bottom:10px; }
  .fq-font-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .fq-font-btn { display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:10px;cursor:pointer; }
  .fq-font-btn.active { border-color:var(--gold); background:rgba(212,175,55,.12); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const LEVELS = [
  {
    id: 0, title: "Fondations", subtitle: "L'argent, le temps, le risque",
    title_en: "Foundations", subtitle_en: "Money, time, risk",
    color: "#C9A227",
    modules: [
      {
        lesson: "Un euro aujourd'hui vaut plus qu'un euro dans dix ans. Pourquoi ? Parce que l'euro d'aujourd'hui peut être investi et produire un rendement pendant ces dix années. C'est le principe de la 'valeur temporelle de l'argent', l'un des tout premiers concepts enseignés en finance, à la base de tous les calculs d'actualisation que vous croiserez plus loin dans ce parcours. Exemple concret : si vous placez 100€ à 5% par an, vous aurez environ 163€ dans 10 ans. Ces 100€ 'valent' donc plus aujourd'hui que dans le futur, puisqu'ils ont le temps de travailler. Erreur fréquente : croire que 1000€ promis dans 5 ans équivalent à 1000€ aujourd'hui — ce n'est jamais vrai dès qu'un taux d'intérêt existe.",
        q: "Que représente la valeur temporelle de l'argent ?",
        a: ["1€ aujourd'hui vaut plus que 1€ dans 10 ans", "1€ vaut toujours la même chose", "L'argent perd sa valeur seulement en cas de guerre", "Ça ne concerne que les banques"],
        correct: 0,
        explanationCorrect: "Exactement : un euro disponible maintenant peut être investi et produire un rendement, ce qui le rend plus précieux qu'un euro reçu plus tard. Retenez la formule intuitive : Argent aujourd'hui + Temps + Taux d'intérêt = Plus d'argent demain. C'est la notion qui justifie tout le reste (actualisation, DCF, VAN) que vous verrez plus loin.",
        explanationWrong: "Ce n'est pas la bonne réponse. Dire que '1€ vaut toujours la même chose' ignore l'effet du temps et du rendement possible : un euro aujourd'hui peut être placé et grossir, un euro futur non. Reprenons l'exemple : 100€ placés à 5% par an valent environ 163€ dans 10 ans — la vraie réponse est donc que 1€ aujourd'hui vaut plus que 1€ dans 10 ans. Ce principe s'applique à toute décision financière, pas seulement aux banques ou aux périodes de guerre.",
      },
      {
        lesson: "L'intérêt composé, c'est l'intérêt calculé non seulement sur votre capital de départ, mais aussi sur les intérêts déjà accumulés les années précédentes. C'est très différent de l'intérêt simple, calculé uniquement sur le capital initial. Exemple : avec 1000€ à 10% par an en intérêt simple, vous gagnez 100€ chaque année pendant 5 ans, soit 1500€ au total. Avec l'intérêt composé, la deuxième année vous touchez 10% sur 1100€ (pas seulement sur 1000€), et ainsi de suite : au bout de 5 ans vous avez environ 1610€. La différence grandit avec le temps — Einstein aurait qualifié ce mécanisme de 'huitième merveille du monde'. Astuce pour mieux comprendre : imaginez une boule de neige qui roule et grossit en ramassant plus de neige à chaque tour, la neige déjà collée continuant elle aussi à en ramasser.",
        q: "L'intérêt composé, c'est...",
        a: ["Un intérêt calculé uniquement sur le capital initial", "Un intérêt calculé sur le capital + les intérêts déjà accumulés", "Un intérêt fixe imposé par l'État", "Un synonyme d'inflation"],
        correct: 1,
        explanationCorrect: "C'est bien ça : l'intérêt composé se recalcule chaque période sur le capital ET sur les intérêts déjà générés, ce qui crée cet effet 'boule de neige' qui s'accélère avec le temps. Plus la durée est longue, plus l'écart avec l'intérêt simple devient spectaculaire — c'est pour cela qu'investir tôt compte tellement plus que le montant investi au départ.",
        explanationWrong: "Pas tout à fait. La première option (intérêt calculé uniquement sur le capital initial) décrit en réalité l'intérêt SIMPLE, pas le composé. L'intérêt composé, lui, recalcule aussi sur les intérêts déjà accumulés — c'est ce qui le rend si puissant sur le long terme. Et attention à ne pas confondre avec l'inflation, qui est un phénomène totalement différent : elle mesure la hausse générale des prix, pas la rémunération d'un placement.",
      },
      {
        lesson: "Le rendement 'réel' d'une épargne, c'est le rendement nominal (celui affiché par votre banque) moins l'inflation. Formule simple : Taux réel ≈ Taux nominal − Inflation. Si votre livret rapporte 2% par an, mais que l'inflation est de 4% cette année-là, votre argent perd en réalité 2% de pouvoir d'achat, même si le chiffre sur votre relevé a augmenté. C'est un piège fréquent chez les épargnants débutants : voir son solde grimper ne veut pas dire qu'on s'enrichit réellement en termes de ce qu'on peut acheter avec.",
        q: "Si l'inflation est plus élevée que le rendement de votre épargne, alors...",
        a: ["Vous gagnez du pouvoir d'achat", "Vous perdez du pouvoir d'achat", "Rien ne change", "Votre épargne double"],
        correct: 1,
        explanationCorrect: "Précisément. Même si le montant en euros augmente sur votre relevé, ces euros achètent moins de biens et services qu'avant, car les prix ont grimpé plus vite que votre épargne. C'est exactement pour cette raison que les investisseurs cherchent des rendements supérieurs à l'inflation sur le long terme — un rendement 'positif' ne suffit pas s'il reste inférieur à l'inflation.",
        explanationWrong: "Non, c'est l'inverse. Reprenons la formule : Taux réel ≈ Taux nominal − Inflation. Si l'inflation (4%) dépasse le rendement nominal (2%), le taux réel est négatif (2% − 4% = −2%) : vous perdez du pouvoir d'achat, même si votre solde en euros a grimpé. C'est un piège classique qu'il faut absolument retenir avant d'avancer dans le parcours.",
      },
      {
        lesson: "Le principe risque/rendement est le socle de toute décision d'investissement : plus le risque potentiel d'un placement est élevé, plus le rendement espéré doit l'être en compensation — sinon, personne n'accepterait de prendre ce risque plutôt qu'un placement plus sûr. C'est pour cela qu'une obligation d'État très sûre rapporte peu, alors qu'une action d'une jeune entreprise, plus risquée, peut offrir un potentiel de gain plus élevé... mais aussi de perte. Règle d'or à retenir : si on vous promet un rendement élevé garanti 'sans aucun risque', c'est presque toujours un signal d'alerte (arnaque type Ponzi, par exemple celle de Bernard Madoff).",
        q: "En finance, le principe risque/rendement dit que...",
        a: ["Un rendement élevé est toujours sans risque", "Plus le risque potentiel est élevé, plus le rendement espéré doit l'être aussi", "Le risque n'a aucun lien avec le rendement", "Il faut éviter tout risque, toujours"],
        correct: 1,
        explanationCorrect: "C'est ça : risque et rendement espéré évoluent normalement dans le même sens, c'est la logique même du marché — personne ne prendrait un risque supplémentaire pour le même rendement qu'un placement sûr. Gardez ce réflexe en tête pour la suite du parcours : chaque fois qu'un placement affiche un rendement élevé, demandez-vous quel risque il cache.",
        explanationWrong: "Ce n'est pas la bonne réponse. Un rendement élevé 'sans risque' est justement le signal d'alerte classique des arnaques financières (type Ponzi) : en réalité, plus le risque est élevé, plus le rendement espéré doit l'être pour compenser. Et éviter tout risque n'est pas réaliste non plus : même garder de l'argent liquide comporte un risque, celui de l'inflation vue à la leçon précédente.",
      },
      {
        lesson: "Toutes les dettes ne se valent pas. Une 'bonne dette' finance un actif qui génère de la valeur ou des revenus dans le temps : un prêt étudiant qui augmente votre capacité de revenu futur, un crédit immobilier locatif qui génère des loyers, ou un prêt pour développer une entreprise rentable. Une 'mauvaise dette' finance des biens qui perdent immédiatement de la valeur et ne rapportent rien, comme un crédit à la consommation pour des achats non essentiels à taux élevé. Astuce pour trancher : demandez-vous toujours 'Est-ce que ce que j'achète avec cet argent emprunté va me rapporter plus que ce qu'il me coûte en intérêts ?'",
        q: "Une 'bonne dette' sert généralement à...",
        a: ["Financer des vacances", "Financer un actif qui génère de la valeur ou des revenus (étude, immobilier locatif, entreprise)", "Acheter des produits qui perdent leur valeur immédiatement", "Payer d'autres dettes uniquement"],
        correct: 1,
        explanationCorrect: "Exactement : c'est l'usage qui distingue une bonne d'une mauvaise dette — financer un actif qui rapporte (immobilier locatif, formation, entreprise) plutôt qu'une dépense qui ne génère aucun retour futur. Retenez la question-test de la leçon : est-ce que cet emprunt va me rapporter plus qu'il ne me coûte ?",
        explanationWrong: "Pas exactement. Les vacances ou les achats de consommation financés à crédit ne créent aucune valeur future — l'argent est simplement dépensé, pas investi, ce qui en fait plutôt de la 'mauvaise dette'. La bonne réponse est de financer un actif générateur de valeur (immobilier locatif, formation, entreprise), qui rapporte davantage que son coût en intérêts.",
      },
    ],
  },
  {
    id: 1, title: "Finance personnelle", subtitle: "Budget, épargne, patrimoine",
    title_en: "Personal Finance", subtitle_en: "Budget, savings, net worth",
    color: "#8AA876",
    modules: [
      {
        lesson: "Le patrimoine net, c'est la vraie photo de votre richesse à un instant donné. On le calcule ainsi : Patrimoine net = Actifs (ce que vous possédez : épargne, immobilier, placements) moins Passifs (ce que vous devez : crédits, dettes). Exemple détaillé : vous possédez un appartement de 200 000€ et avez 30 000€ d'épargne, mais il vous reste 150 000€ de crédit immobilier à rembourser. Votre patrimoine net est de 200 000 + 30 000 − 150 000 = 80 000€. Retenez bien : posséder un bien de grande valeur ne veut pas dire être riche si la dette associée est encore élevée.",
        q: "Le patrimoine net se calcule comme :",
        a: ["Revenus − Dépenses", "Actifs − Passifs", "Épargne + Salaire", "Actifs + Passifs"],
        correct: 1,
        explanationCorrect: "C'est exact : Actifs − Passifs, ce que vous possédez moins ce que vous devez. Reprenez l'exemple de la leçon si besoin : 200 000 (appartement) + 30 000 (épargne) − 150 000 (crédit restant) = 80 000€ de patrimoine net.",
        explanationWrong: "Ce n'est pas ça. 'Revenus − Dépenses' donne votre épargne mensuelle ou annuelle (un flux dans le temps), ce qui est différent du patrimoine net (une photo à un instant T). La bonne formule est Actifs − Passifs : reprenez l'exemple de la leçon, 200 000 + 30 000 − 150 000 = 80 000€.",
      },
      {
        lesson: "Un fonds d'urgence, c'est une réserve d'argent facilement disponible, généralement équivalente à 3 à 6 mois de dépenses essentielles (loyer, nourriture, factures). Son but : éviter de s'endetter à taux élevé en cas d'imprévu — perte d'emploi, panne de voiture, urgence médicale. C'est la toute première brique recommandée par la quasi-totalité des conseillers financiers, avant même de commencer à investir en bourse, car investir de l'argent dont on pourrait avoir besoin dans l'urgence oblige parfois à vendre au pire moment (quand les marchés ont justement baissé).",
        q: "Un fonds d'urgence sert à couvrir généralement :",
        a: ["1 semaine de dépenses", "3 à 6 mois de dépenses essentielles", "10 ans de dépenses", "Uniquement les impôts"],
        correct: 1,
        explanationCorrect: "Tout à fait : 3 à 6 mois de dépenses essentielles est la norme la plus largement recommandée, assez pour absorber un choc sans devoir emprunter à taux élevé ou vendre des investissements en catastrophe.",
        explanationWrong: "Non. Une semaine est nettement insuffisante face à un vrai imprévu (perte d'emploi, par exemple), et 10 ans dépasse largement l'objectif d'un fonds 'd'urgence' — ce serait alors de l'épargne de long terme. La norme retenue par la plupart des conseillers est 3 à 6 mois de dépenses essentielles.",

  { cat: "Macroéconomie", term: "Stagflation", def: "Situation économique combinant stagnation de la croissance et inflation élevée en même temps." },
  { cat: "Macroéconomie", term: "Chômage", def: "Situation d'une personne en âge de travailler, sans emploi, et à la recherche active d'un travail." },
  { cat: "Macroéconomie", term: "Taux de chômage", def: "Part de la population active qui est au chômage, exprimée en pourcentage." },
  { cat: "Macroéconomie", term: "Population active", def: "Ensemble des personnes en âge de travailler qui ont un emploi ou en recherchent un." },
  { cat: "Macroéconomie", term: "Récession", def: "Période de recul de l'activité économique, généralement définie par deux trimestres consécutifs de baisse du PIB." },
  { cat: "Macroéconomie", term: "Dépression économique", def: "Récession particulièrement longue et sévère, avec un fort impact sur l'emploi et la production." },
  { cat: "Macroéconomie", term: "Reprise économique", def: "Phase où l'activité économique recommence à croître après une récession." },
  { cat: "Macroéconomie", term: "Cycle économique", def: "Alternance dans le temps entre phases d'expansion, de pic, de récession et de creux de l'activité économique." },
  { cat: "Macroéconomie", term: "Politique monétaire", def: "Ensemble des décisions d'une banque centrale (taux d'intérêt, masse monétaire) pour piloter l'économie." },
  { cat: "Macroéconomie", term: "Politique budgétaire", def: "Ensemble des décisions d'un gouvernement sur les impôts et les dépenses publiques." },
  { cat: "Macroéconomie", term: "Déficit public", def: "Situation où les dépenses de l'État dépassent ses recettes sur une période donnée." },
  { cat: "Macroéconomie", term: "Dette publique", def: "Ensemble des sommes empruntées par un État, cumulées au fil des déficits successifs." },
  { cat: "Macroéconomie", term: "Banque centrale", def: "Institution qui pilote la politique monétaire d'un pays ou d'une zone (ex : BCE, Réserve fédérale américaine)." },
  { cat: "Macroéconomie", term: "Taux directeur", def: "Taux d'intérêt fixé par une banque centrale, qui influence tous les autres taux de l'économie." },
  { cat: "Macroéconomie", term: "Masse monétaire", def: "Quantité totale de monnaie en circulation dans une économie à un instant donné." },
  { cat: "Macroéconomie", term: "Assouplissement quantitatif (Quantitative Easing)", def: "Politique monétaire où une banque centrale rachète massivement des actifs pour injecter des liquidités dans l'économie." },
  { cat: "Macroéconomie", term: "Pouvoir d'achat", def: "Quantité de biens et services qu'un revenu donné permet réellement d'acheter." },
  { cat: "Macroéconomie", term: "Taux réel", def: "Rendement ou taux corrigé de l'inflation, reflétant le gain réel de pouvoir d'achat." },
  { cat: "Macroéconomie", term: "Courbe des taux", def: "Représentation des taux d'intérêt selon la durée d'un emprunt ; sa forme renseigne sur les attentes économiques futures." },

  // ÉCONOMIE INTERNATIONALE
  { cat: "Économie internationale", term: "Importation", def: "Achat de biens ou services produits à l'étranger, introduits sur le territoire national." },
  { cat: "Économie internationale", term: "Exportation", def: "Vente de biens ou services produits localement vers d'autres pays." },
  { cat: "Économie internationale", term: "Balance commerciale", def: "Différence entre la valeur des exportations et des importations d'un pays." },
  { cat: "Économie internationale", term: "Balance des paiements", def: "Document comptable qui recense l'ensemble des transactions économiques d'un pays avec le reste du monde." },
  { cat: "Économie internationale", term: "Taux de change", def: "Valeur d'une monnaie exprimée dans une autre monnaie." },
  { cat: "Économie internationale", term: "Libre-échange", def: "Doctrine économique favorisant la suppression des barrières douanières entre pays." },
  { cat: "Économie internationale", term: "Protectionnisme", def: "Politique visant à protéger l'économie nationale de la concurrence étrangère, via des taxes ou quotas à l'importation." },
  { cat: "Économie internationale", term: "Mondialisation", def: "Processus d'intégration croissante des économies nationales à l'échelle mondiale (échanges, capitaux, entreprises)." },
  { cat: "Économie internationale", term: "Délocalisation", def: "Transfert d'une activité de production d'un pays vers un autre, souvent pour réduire les coûts." },
  { cat: "Économie internationale", term: "FMI (Fonds Monétaire International)", def: "Institution internationale qui aide les pays en difficulté financière et surveille la stabilité économique mondiale." },
  { cat: "Économie internationale", term: "Banque mondiale", def: "Institution internationale qui finance des projets de développement dans les pays en développement." },
  { cat: "Économie internationale", term: "Zone euro", def: "Ensemble des pays de l'Union européenne ayant adopté l'euro comme monnaie commune." },

  // COMPTABILITÉ
  { cat: "Comptabilité", term: "Bilan comptable", def: "Photographie du patrimoine d'une entreprise à un instant précis : ce qu'elle possède (actif) et ce qu'elle doit (passif + capitaux propres)." },
  { cat: "Comptabilité", term: "Actif", def: "Ce qu'une personne ou une entreprise possède ayant une valeur économique (argent, biens, placements)." },
  { cat: "Comptabilité", term: "Passif", def: "Ce qu'une personne ou une entreprise doit (dettes, crédits, obligations financières)." },
  { cat: "Comptabilité", term: "Capitaux propres", def: "Ressources appartenant aux actionnaires : capital apporté + bénéfices non distribués." },
  { cat: "Comptabilité", term: "Compte de résultat", def: "Document qui mesure la performance d'une entreprise sur une période : revenus moins charges égale bénéfice ou perte." },
  { cat: "Comptabilité", term: "Chiffre d'affaires (CA)", def: "Total des ventes réalisées par une entreprise sur une période, avant déduction des charges." },
  { cat: "Comptabilité", term: "Charges", def: "Dépenses supportées par une entreprise pour fonctionner (achats, salaires, impôts, intérêts...)." },
  { cat: "Comptabilité", term: "Produits (comptables)", def: "Sommes perçues ou à percevoir par une entreprise du fait de son activité (ventes, prestations, intérêts reçus...)." },
  { cat: "Comptabilité", term: "Amortissement", def: "Répartition comptable du coût d'un actif durable sur sa durée de vie utile." },
  { cat: "Comptabilité", term: "Provision", def: "Somme mise de côté par une entreprise pour couvrir un risque ou une charge future probable." },
  { cat: "Comptabilité", term: "Valeur ajoutée", def: "Richesse créée par une entreprise : la valeur de sa production moins ce qu'elle a consommé pour produire." },
  { cat: "Comptabilité", term: "EBE (Excédent Brut d'Exploitation)", def: "Indicateur de rentabilité d'une entreprise avant amortissements, intérêts et impôts." },
  { cat: "Comptabilité", term: "Résultat d'exploitation", def: "Bénéfice généré par l'activité normale de l'entreprise, avant les éléments financiers et exceptionnels." },
  { cat: "Comptabilité", term: "Résultat net", def: "Bénéfice final de l'entreprise après toutes les charges, y compris les impôts." },
  { cat: "Comptabilité", term: "Trésorerie", def: "Argent immédiatement disponible sur les comptes d'une entreprise ou d'une personne." },
  { cat: "Comptabilité", term: "Actif circulant", def: "Ce qu'une entreprise possède et prévoit de transformer en argent à court terme (stocks, créances clients)." },
  { cat: "Comptabilité", term: "Immobilisation", def: "Bien durable détenu par une entreprise pour son activité (machine, bâtiment, brevet), destiné à rester longtemps." },
  { cat: "Comptabilité", term: "Créance", def: "Somme d'argent qu'une entité doit recevoir d'un tiers (ex : client qui n'a pas encore payé)." },
  { cat: "Comptabilité", term: "Dette fournisseur", def: "Somme qu'une entreprise doit encore payer à ses fournisseurs pour des achats déjà reçus." },
  { cat: "Comptabilité", term: "TVA (Taxe sur la Valeur Ajoutée)", def: "Impôt indirect payé par le consommateur final, inclus dans le prix des biens et services." },
  { cat: "Comptabilité", term: "BFR (Besoin en Fonds de Roulement)", def: "Argent qu'une entreprise doit avancer pour financer son cycle d'exploitation avant d'être payée par ses clients." },

  // FINANCE D'ENTREPRISE
  { cat: "Finance d'entreprise", term: "VAN (Valeur Actuelle Nette)", def: "Indicateur qui montre si un investissement crée (>0) ou détruit (<0) de la valeur pour l'entreprise." },
  { cat: "Finance d'entreprise", term: "TRI (Taux de Rendement Interne)", def: "Taux d'actualisation pour lequel la VAN d'un projet est exactement égale à zéro." },
  { cat: "Finance d'entreprise", term: "WACC (coût moyen pondéré du capital)", def: "Taux de rendement minimum qu'une entreprise doit générer pour satisfaire créanciers et actionnaires." },
  { cat: "Finance d'entreprise", term: "DCF (Discounted Cash Flow)", def: "Méthode de valorisation d'entreprise par actualisation des flux de trésorerie futurs." },
  { cat: "Finance d'entreprise", term: "EBITDA", def: "Bénéfice avant intérêts, impôts, dépréciation et amortissement — mesure de la rentabilité opérationnelle." },
  { cat: "Finance d'entreprise", term: "Valeur d'entreprise (EV)", def: "Valeur totale d'une entreprise incluant sa capitalisation boursière et sa dette nette." },
  { cat: "Finance d'entreprise", term: "LBO (Leveraged Buyout)", def: "Rachat d'une entreprise financé en grande partie par de la dette, remboursée par les flux futurs de la cible." },
  { cat: "Finance d'entreprise", term: "M&A (Fusions-acquisitions)", def: "Opérations de rapprochement, rachat ou fusion entre entreprises." },
  { cat: "Finance d'entreprise", term: "Due diligence", def: "Examen approfondi des comptes et risques d'une entreprise avant une acquisition." },
  { cat: "Finance d'entreprise", term: "Synergie", def: "Valeur additionnelle créée par la combinaison de deux entreprises lors d'une fusion-acquisition." },
  { cat: "Finance d'entreprise", term: "IPO (introduction en bourse)", def: "Première vente d'actions d'une entreprise au grand public sur un marché boursier." },
  { cat: "Finance d'entreprise", term: "Private equity", def: "Investissement en capital dans des entreprises non cotées en bourse, souvent via LBO ou capital-risque." },
  { cat: "Finance d'entreprise", term: "Capital-risque (Venture Capital)", def: "Financement de jeunes entreprises à fort potentiel de croissance mais à risque élevé." },
  { cat: "Finance d'entreprise", term: "Levier financier", def: "Utilisation de la dette pour amplifier le rendement (et le risque) d'un investissement ou d'un rachat d'entreprise." },
  { cat: "Finance d'entreprise", term: "Société anonyme (SA)", def: "Forme juridique d'entreprise dont le capital est divisé en actions, avec responsabilité limitée des actionnaires." },
  { cat: "Finance d'entreprise", term: "SARL", def: "Société à Responsabilité Limitée : forme juridique où les associés ne risquent que leur mise de départ." },

  // MARCHÉS & BOURSE
  { cat: "Marchés & Bourse", term: "Action", def: "Part de propriété d'une entreprise, donnant droit de vote et à une part des bénéfices (dividende)." },
  { cat: "Marchés & Bourse", term: "Obligation", def: "Prêt fait à une entité (État ou entreprise), qui verse un intérêt régulier et rembourse le capital à l'échéance." },
  { cat: "Marchés & Bourse", term: "ETF (Exchange Traded Fund)", def: "Fonds coté en bourse qui réplique un indice ou un panier d'actifs." },
  { cat: "Marchés & Bourse", term: "Indice boursier", def: "Indicateur qui mesure la performance d'un ensemble d'actions représentatif d'un marché (ex : CAC 40, S&P 500)." },
  { cat: "Marchés & Bourse", term: "PER (Price Earning Ratio)", def: "Ratio Prix de l'action / Bénéfice par action, mesure de valorisation boursière." },
  { cat: "Marchés & Bourse", term: "ROE (Return on Equity)", def: "Rentabilité des capitaux propres : bénéfice net rapporté aux capitaux propres." },
  { cat: "Marchés & Bourse", term: "ROA (Return on Assets)", def: "Rentabilité des actifs : bénéfice net rapporté au total des actifs de l'entreprise." },
  { cat: "Marchés & Bourse", term: "Spread bid-ask", def: "Écart entre le prix d'achat et le prix de vente affichés sur un marché." },
  { cat: "Marchés & Bourse", term: "Ordre au marché", def: "Ordre boursier qui s'exécute immédiatement au meilleur prix disponible." },
  { cat: "Marchés & Bourse", term: "Ordre à cours limité", def: "Ordre boursier qui ne s'exécute qu'au prix fixé par l'investisseur, ou à un prix plus favorable." },
  { cat: "Marchés & Bourse", term: "Volatilité", def: "Amplitude des variations de prix d'un actif ; plus elle est élevée, plus le risque perçu est grand." },
  { cat: "Marchés & Bourse", term: "Capitalisation boursière", def: "Valeur totale d'une entreprise en bourse : prix de l'action multiplié par le nombre d'actions en circulation." },
  { cat: "Marchés & Bourse", term: "Liquidité (marché)", def: "Facilité avec laquelle un actif peut être acheté ou vendu rapidement sans faire varier son prix." },
  { cat: "Marchés & Bourse", term: "Split d'action", def: "Division du prix d'une action et multiplication du nombre d'actions en circulation, sans changer la valeur totale." },
  { cat: "Marchés & Bourse", term: "Dividende", def: "Part des bénéfices qu'une entreprise reverse à ses actionnaires." },
  { cat: "Marchés & Bourse", term: "Marché primaire", def: "Marché où les titres financiers sont émis pour la première fois (ex : lors d'une IPO)." },
  { cat: "Marchés & Bourse", term: "Marché secondaire", def: "Marché où s'échangent des titres financiers déjà émis, entre investisseurs." },
  { cat: "Marchés & Bourse", term: "Courtier", def: "Intermédiaire qui exécute les ordres d'achat et de vente d'un investisseur sur les marchés financiers." },
  { cat: "Marchés & Bourse", term: "Krach boursier", def: "Chute brutale et généralisée des cours de bourse sur une courte période." },
  { cat: "Marchés & Bourse", term: "Bulle spéculative", def: "Situation où le prix d'un actif s'envole bien au-delà de sa valeur réelle, avant un retour brutal à la normale." },
  { cat: "Marchés & Bourse", term: "Actionnaire", def: "Personne ou entité qui détient une ou plusieurs actions d'une entreprise." },
  { cat: "Marchés & Bourse", term: "Créancier", def: "Personne ou entité à qui de l'argent est dû (ex : détenteur d'une obligation, banque prêteuse)." },
  { cat: "Marchés & Bourse", term: "Rating (notation de crédit)", def: "Évaluation par une agence (S&P, Moody's...) du risque de défaut d'un émetteur de dette." },
  { cat: "Marchés & Bourse", term: "Défaut de paiement", def: "Incapacité d'un emprunteur à rembourser sa dette aux conditions prévues." },
  { cat: "Marchés & Bourse", term: "Hedge fund", def: "Fonds d'investissement utilisant des stratégies avancées (levier, vente à découvert) pour générer du rendement." },
  { cat: "Marchés & Bourse", term: "REIT", def: "Société cotée en bourse qui investit dans l'immobilier générateur de revenus." },
  { cat: "Marchés & Bourse", term: "Diversification", def: "Répartition d'un investissement entre plusieurs actifs différents pour réduire le risque global." },
  { cat: "Marchés & Bourse", term: "Portefeuille", def: "Ensemble des placements (actions, obligations, etc.) détenus par un investisseur." },
  { cat: "Marchés & Bourse", term: "Moat (avantage concurrentiel)", def: "Avantage durable qui protège une entreprise de la concurrence (marque, brevets, effets de réseau)." },

  // BANQUE & CRÉDIT
  { cat: "Banque & Crédit", term: "Intérêt", def: "Somme versée en échange d'un prêt d'argent — la rémunération du prêteur pour le risque et le temps." },
  { cat: "Banque & Crédit", term: "Taux d'intérêt", def: "Pourcentage appliqué à un capital, qui détermine le montant de l'intérêt versé ou reçu." },
  { cat: "Banque & Crédit", term: "Intérêt composé", def: "Intérêt calculé sur le capital ET sur les intérêts déjà accumulés, créant un effet cumulatif dans le temps." },
  { cat: "Banque & Crédit", term: "Intérêt simple", def: "Intérêt calculé uniquement sur le capital initial, sans effet cumulatif." },
  { cat: "Banque & Crédit", term: "Crédit", def: "Somme d'argent prêtée par une banque ou un organisme, à rembourser avec intérêts sur une durée définie." },
  { cat: "Banque & Crédit", term: "TAEG (Taux Annuel Effectif Global)", def: "Coût total d'un crédit exprimé en pourcentage annuel, incluant intérêts et frais annexes." },
  { cat: "Banque & Crédit", term: "Emprunteur", def: "Personne ou entité qui reçoit un prêt et s'engage à le rembourser avec intérêt." },
  { cat: "Banque & Crédit", term: "Prêteur", def: "Personne ou entité qui met de l'argent à disposition d'un emprunteur, contre remboursement et intérêt." },
  { cat: "Banque & Crédit", term: "Caution", def: "Engagement pris par une personne ou un organisme de rembourser une dette si l'emprunteur ne le fait pas." },
  { cat: "Banque & Crédit", term: "Hypothèque", def: "Garantie prise sur un bien immobilier en échange d'un prêt, permettant sa saisie en cas de non-remboursement." },
  { cat: "Banque & Crédit", term: "Découvert bancaire", def: "Situation où le solde d'un compte bancaire devient négatif, généralement autorisé dans une certaine limite." },
  { cat: "Banque & Crédit", term: "Duration (obligation)", def: "Sensibilité du prix d'une obligation aux variations de taux d'intérêt." },

  // FINANCE PERSONNELLE
  { cat: "Finance personnelle", term: "Budget", def: "Prévision chiffrée des revenus et dépenses sur une période donnée, personnelle ou d'entreprise." },
  { cat: "Finance personnelle", term: "Patrimoine net", def: "Ce qu'une personne possède (actifs) moins ce qu'elle doit (passifs) — la vraie photo de sa richesse." },
  { cat: "Finance personnelle", term: "Fonds d'urgence", def: "Réserve d'argent facilement disponible pour faire face à un imprévu, sans s'endetter." },
  { cat: "Finance personnelle", term: "Taux d'endettement", def: "Part des revenus mensuels consacrée au remboursement de crédits." },
  { cat: "Finance personnelle", term: "Épargne", def: "Part des revenus non consommée, mise de côté ou investie pour l'avenir." },
  { cat: "Finance personnelle", term: "Épargnant", def: "Personne qui met de côté une partie de ses revenus au lieu de les dépenser immédiatement." },
  { cat: "Finance personnelle", term: "Investissement", def: "Engagement d'argent aujourd'hui dans le but d'obtenir un revenu ou une plus-value dans le futur." },
  { cat: "Finance personnelle", term: "Assurance-vie", def: "Placement financier permettant d'épargner sur le long terme, avec des avantages fiscaux et de transmission." },
  { cat: "Finance personnelle", term: "PEA (Plan d'Épargne en Actions)", def: "Enveloppe fiscale française permettant d'investir en actions européennes avec une fiscalité allégée après 5 ans." },
  { cat: "Finance personnelle", term: "Compte-titres", def: "Compte permettant d'investir en bourse sans les avantages fiscaux du PEA, mais avec plus de flexibilité." },
  { cat: "Finance personnelle", term: "Impôt sur le revenu", def: "Prélèvement obligatoire sur les revenus d'une personne, calculé selon un barème progressif dans la plupart des pays." },
  { cat: "Finance personnelle", term: "Cotisation sociale", def: "Somme prélevée sur le salaire pour financer la protection sociale (santé, retraite, chômage)." },
  { cat: "Finance personnelle", term: "Rendement", def: "Gain généré par un placement, exprimé le plus souvent en pourcentage du montant investi." },
  { cat: "Finance personnelle", term: "Ratio de Sharpe", def: "Indicateur de rendement ajusté du risque, comparant le rendement d'un placement à sa volatilité." },
  { cat: "Finance personnelle", term: "VaR (Value at Risk)", def: "Estimation statistique de la perte potentielle maximale d'un portefeuille sur une période donnée." },
  { cat: "Macroéconomie", term: "Désinflation", def: "Ralentissement du rythme de l'inflation — les prix continuent d'augmenter, mais moins vite qu'avant." },
  { cat: "Macroéconomie", term: "Shrinkflation", def: "Pratique consistant à réduire la quantité d'un produit sans baisser son prix, une inflation déguisée." },
  { cat: "Macroéconomie", term: "Hyperinflation", def: "Inflation extrêmement rapide et incontrôlée, qui détruit la valeur d'une monnaie en quelques mois ou semaines." },
  { cat: "Macroéconomie", term: "Indice des prix à la consommation (IPC)", def: "Indicateur qui mesure l'évolution du prix d'un panier de biens et services représentatif de la consommation des ménages." },
  { cat: "Macroéconomie", term: "Panier de la ménagère", def: "Ensemble représentatif de biens et services utilisé pour calculer l'indice des prix à la consommation." },
  { cat: "Macroéconomie", term: "Parité de pouvoir d'achat", def: "Méthode de comparaison du niveau de vie entre pays, ajustant les différences de prix locaux." },
  { cat: "Macroéconomie", term: "Courbe de Phillips", def: "Relation théorique observée entre le taux de chômage et le taux d'inflation dans une économie." },
  { cat: "Macroéconomie", term: "Effet multiplicateur", def: "Mécanisme par lequel une dépense publique initiale entraîne une hausse plus que proportionnelle de l'activité économique." },
  { cat: "Macroéconomie", term: "Trappe à liquidité", def: "Situation où une baisse des taux d'intérêt par la banque centrale ne parvient plus à relancer l'économie." },
  { cat: "Macroéconomie", term: "Agrégats monétaires (M1, M2, M3)", def: "Mesures de la quantité de monnaie en circulation, du plus liquide (M1) au moins liquide (M3)." },
  { cat: "Macroéconomie", term: "Réserves obligatoires", def: "Part des dépôts qu'une banque commerciale doit conserver auprès de la banque centrale, sans pouvoir la prêter." },
  { cat: "Macroéconomie", term: "Étalon-or", def: "Système monétaire historique où la valeur d'une monnaie était directement liée à une quantité d'or." },
  { cat: "Macroéconomie", term: "Accords de Bretton Woods", def: "Accords de 1944 ayant établi un système monétaire international basé sur le dollar convertible en or." },
  { cat: "Macroéconomie", term: "Agence de notation", def: "Organisme qui évalue la solvabilité des États et des entreprises (ex : Moody's, S&P, Fitch)." },
  { cat: "Macroéconomie", term: "Récession technique", def: "Définition la plus courante d'une récession : deux trimestres consécutifs de baisse du PIB." },
  { cat: "Macroéconomie", term: "Indice de développement humain (IDH)", def: "Indicateur composite mesurant le niveau de développement d'un pays au-delà du seul PIB (santé, éducation, revenu)." },

  { cat: "Microéconomie", term: "Économie d'échelle", def: "Baisse du coût unitaire de production quand le volume produit augmente." },
  { cat: "Microéconomie", term: "Rendements d'échelle", def: "Façon dont la production évolue lorsque tous les facteurs de production augmentent proportionnellement." },
  { cat: "Microéconomie", term: "Marché contestable", def: "Marché où, même avec peu d'entreprises, la menace de nouveaux entrants limite les abus de pouvoir de marché." },
  { cat: "Microéconomie", term: "Cartel", def: "Entente illégale entre entreprises concurrentes pour fixer les prix ou se répartir un marché." },
  { cat: "Microéconomie", term: "Dumping", def: "Pratique consistant à vendre un produit à un prix anormalement bas, souvent pour éliminer la concurrence." },
  { cat: "Microéconomie", term: "Surplus du consommateur", def: "Différence entre ce qu'un consommateur est prêt à payer pour un bien et ce qu'il paie réellement." },
  { cat: "Microéconomie", term: "Surplus du producteur", def: "Différence entre le prix reçu par un vendeur et le prix minimum auquel il aurait été prêt à vendre." },
  { cat: "Microéconomie", term: "Bien substituable", def: "Bien qui peut remplacer un autre pour satisfaire un même besoin (ex : beurre et margarine)." },
  { cat: "Microéconomie", term: "Bien complémentaire", def: "Bien dont la consommation est liée à celle d'un autre bien (ex : voiture et essence)." },
  { cat: "Microéconomie", term: "Rareté", def: "Principe économique de base : les ressources disponibles sont limitées face à des besoins illimités." },

  { cat: "Comptabilité", term: "Grand livre", def: "Registre comptable qui regroupe l'ensemble des comptes d'une entreprise et leurs mouvements." },
  { cat: "Comptabilité", term: "Journal comptable", def: "Registre chronologique de toutes les opérations comptables d'une entreprise." },
  { cat: "Comptabilité", term: "Liasse fiscale", def: "Ensemble des documents comptables qu'une entreprise doit transmettre à l'administration fiscale chaque année." },
  { cat: "Comptabilité", term: "Méthode FIFO", def: "'First In, First Out' : méthode de valorisation des stocks où les premiers articles entrés sont considérés comme les premiers sortis." },
  { cat: "Comptabilité", term: "Méthode LIFO", def: "'Last In, First Out' : méthode de valorisation des stocks où les derniers articles entrés sont considérés comme les premiers sortis." },
  { cat: "Comptabilité", term: "Actif net comptable", def: "Valeur comptable d'une entreprise : total des actifs moins les dettes, telle qu'inscrite dans ses comptes." },
  { cat: "Comptabilité", term: "Goodwill (écart d'acquisition)", def: "Différence entre le prix payé pour racheter une entreprise et la valeur comptable de ses actifs nets." },
  { cat: "Comptabilité", term: "Actif incorporel", def: "Bien sans substance physique mais ayant une valeur économique pour l'entreprise (marque, brevet, logiciel)." },
  { cat: "Comptabilité", term: "Consolidation comptable", def: "Regroupement des comptes d'une société mère et de ses filiales en un seul jeu d'états financiers." },
  { cat: "Comptabilité", term: "Normes IFRS", def: "Normes comptables internationales utilisées par de nombreuses entreprises cotées pour harmoniser leurs comptes." },
  { cat: "Comptabilité", term: "Commissaire aux comptes", def: "Professionnel indépendant chargé de vérifier et certifier la fiabilité des comptes d'une entreprise." },
  { cat: "Comptabilité", term: "Audit financier", def: "Examen indépendant des comptes d'une entreprise pour en vérifier la conformité et la sincérité." },
  { cat: "Comptabilité", term: "Capital social", def: "Somme des apports des associés ou actionnaires lors de la création ou d'une augmentation de capital d'une entreprise." },

  { cat: "Finance d'entreprise", term: "OPA (Offre Publique d'Achat)", def: "Procédure par laquelle une entreprise propose publiquement de racheter les actions d'une autre société cotée." },
  { cat: "Finance d'entreprise", term: "OPE (Offre Publique d'Échange)", def: "Variante de l'OPA où le paiement se fait en actions de l'acquéreur plutôt qu'en cash." },
  { cat: "Finance d'entreprise", term: "Pacte d'actionnaires", def: "Contrat entre actionnaires qui organise leurs relations, droits et obligations au-delà des statuts de l'entreprise." },
  { cat: "Finance d'entreprise", term: "Dilution", def: "Réduction du pourcentage de détention d'un actionnaire suite à l'émission de nouvelles actions." },
  { cat: "Finance d'entreprise", term: "Stock-options", def: "Options donnant le droit à un salarié d'acheter des actions de son entreprise à un prix fixé à l'avance." },
  { cat: "Finance d'entreprise", term: "Rachat d'actions (buyback)", def: "Opération où une entreprise rachète ses propres actions en bourse, réduisant leur nombre en circulation." },
  { cat: "Finance d'entreprise", term: "Levée de fonds", def: "Opération par laquelle une entreprise obtient des capitaux auprès d'investisseurs en échange de parts de son capital." },
  { cat: "Finance d'entreprise", term: "Licorne", def: "Startup non cotée en bourse valorisée à plus d'un milliard de dollars." },
  { cat: "Finance d'entreprise", term: "Business angel", def: "Investisseur individuel qui finance de jeunes entreprises avec ses fonds propres, souvent en échange de parts." },
  { cat: "Finance d'entreprise", term: "Crowdfunding", def: "Financement participatif : collecte de fonds auprès d'un grand nombre de particuliers, souvent via internet." },
  { cat: "Finance d'entreprise", term: "Bootstrapping", def: "Développement d'une entreprise avec des ressources propres limitées, sans financement externe." },
  { cat: "Finance d'entreprise", term: "Term sheet", def: "Document résumant les conditions principales d'un investissement avant la signature des contrats définitifs." },

  { cat: "Marchés & Bourse", term: "Obligation convertible", def: "Obligation pouvant être transformée en actions de l'entreprise émettrice, selon des conditions définies à l'avance." },
  { cat: "Marchés & Bourse", term: "Obligation à haut rendement (junk bond)", def: "Obligation émise par une entité au risque de crédit élevé, offrant un rendement plus important en compensation." },
  { cat: "Marchés & Bourse", term: "Contrat à terme (futures)", def: "Contrat standardisé engageant à acheter ou vendre un actif à un prix et une date fixés à l'avance." },
  { cat: "Marchés & Bourse", term: "Option call", def: "Contrat donnant le droit (non l'obligation) d'acheter un actif à un prix fixé avant une échéance donnée." },
  { cat: "Marchés & Bourse", term: "Option put", def: "Contrat donnant le droit (non l'obligation) de vendre un actif à un prix fixé avant une échéance donnée." },
  { cat: "Marchés & Bourse", term: "Warrant", def: "Produit dérivé coté donnant le droit d'acheter ou vendre un actif sous-jacent à des conditions fixées." },
  { cat: "Marchés & Bourse", term: "Fonds indiciel", def: "Fonds de placement dont l'objectif est de répliquer la performance d'un indice boursier." },
  { cat: "Marchés & Bourse", term: "Gestion active", def: "Style de gestion où un gérant sélectionne activement les titres pour tenter de battre un indice de référence." },
  { cat: "Marchés & Bourse", term: "Gestion passive", def: "Style de gestion visant simplement à répliquer la performance d'un indice, sans sélection active de titres." },
  { cat: "Marchés & Bourse", term: "Benchmark", def: "Indice ou référence à laquelle on compare la performance d'un portefeuille ou d'un fonds." },
  { cat: "Marchés & Bourse", term: "Alpha (finance)", def: "Surperformance d'un portefeuille par rapport à son indice de référence, à risque égal." },
  { cat: "Marchés & Bourse", term: "Bêta d'un actif", def: "Mesure de la sensibilité d'un actif aux variations du marché global." },
  { cat: "Marchés & Bourse", term: "Marché de gré à gré (OTC)", def: "Marché où les transactions se négocient directement entre deux parties, sans passer par une bourse organisée." },
  { cat: "Marchés & Bourse", term: "Chambre de compensation", def: "Organisme qui garantit la bonne exécution des transactions financières entre acheteurs et vendeurs." },
  { cat: "Marchés & Bourse", term: "Market maker (teneur de marché)", def: "Acteur qui assure la liquidité d'un marché en affichant en continu des prix d'achat et de vente." },
  { cat: "Marchés & Bourse", term: "Trading haute fréquence (HFT)", def: "Stratégie de trading utilisant des algorithmes pour exécuter un grand nombre d'ordres en quelques microsecondes." },
  { cat: "Marchés & Bourse", term: "Vente à découvert", def: "Stratégie consistant à vendre un actif que l'on ne possède pas encore, en pariant sur une baisse de son prix." },
  { cat: "Marchés & Bourse", term: "Marge (trading)", def: "Somme déposée en garantie pour ouvrir une position avec effet de levier." },
  { cat: "Marchés & Bourse", term: "Appel de marge", def: "Demande d'un courtier d'ajouter des fonds sur un compte quand une position à levier subit des pertes importantes." },

  { cat: "Banque & Crédit", term: "Compte courant", def: "Compte bancaire utilisé pour les opérations quotidiennes (dépôts, retraits, paiements)." },
  { cat: "Banque & Crédit", term: "Compte d'épargne", def: "Compte bancaire destiné à mettre de l'argent de côté, généralement rémunéré par un intérêt." },
  { cat: "Banque & Crédit", term: "Virement bancaire", def: "Transfert d'argent d'un compte bancaire à un autre." },
  { cat: "Banque & Crédit", term: "Prélèvement automatique", def: "Autorisation donnée à un tiers de retirer régulièrement une somme sur un compte bancaire." },
  { cat: "Banque & Crédit", term: "RIB (Relevé d'Identité Bancaire)", def: "Document contenant les informations nécessaires pour identifier un compte bancaire." },
  { cat: "Banque & Crédit", term: "IBAN", def: "Numéro international qui identifie de façon unique un compte bancaire, utilisé pour les virements." },
  { cat: "Banque & Crédit", term: "Néobanque", def: "Banque exclusivement en ligne, sans agence physique, souvent accessible via une application mobile." },
  { cat: "Banque & Crédit", term: "Crédit renouvelable", def: "Réserve d'argent mise à disposition par un organisme, utilisable et remboursable de façon flexible, à taux souvent élevé." },
  { cat: "Banque & Crédit", term: "Taux d'usure", def: "Taux d'intérêt maximal légal qu'un prêteur ne peut pas dépasser pour un crédit donné." },
  { cat: "Banque & Crédit", term: "Surendettement", def: "Situation où une personne ne peut plus faire face à l'ensemble de ses dettes avec ses revenus et son patrimoine." },
  { cat: "Banque & Crédit", term: "Assurance emprunteur", def: "Assurance qui garantit le remboursement d'un prêt en cas de décès, invalidité ou perte d'emploi de l'emprunteur." },
  { cat: "Banque & Crédit", term: "Différé de remboursement", def: "Période pendant laquelle un emprunteur ne rembourse pas (ou partiellement) un crédit, avant le début des mensualités classiques." },
  { cat: "Banque & Crédit", term: "Crypto-monnaie", def: "Monnaie numérique décentralisée, échangée et sécurisée via une technologie de blockchain." },
  { cat: "Banque & Crédit", term: "Blockchain", def: "Technologie de registre numérique partagé et sécurisé, à la base des crypto-monnaies comme le Bitcoin." },

  { cat: "Finance personnelle", term: "Livret A", def: "Livret d'épargne réglementé français, sans risque et défiscalisé, à taux fixé par l'État." },
  { cat: "Finance personnelle", term: "PER (Plan d'Épargne Retraite)", def: "Produit d'épargne à long terme destiné à préparer la retraite, avec des avantages fiscaux à l'entrée." },
  { cat: "Finance personnelle", term: "Prêt étudiant", def: "Crédit destiné à financer des études, souvent à conditions avantageuses (taux réduit, différé de remboursement)." },
  { cat: "Finance personnelle", term: "Retraite par répartition", def: "Système de retraite où les cotisations des actifs financent directement les pensions des retraités actuels." },
  { cat: "Finance personnelle", term: "Retraite par capitalisation", def: "Système de retraite où chacun épargne et investit pour financer sa propre pension future." },

  { cat: "Termes anglophones", term: "Bull market", def: "Marché haussier : période prolongée de hausse des prix des actifs financiers." },
  { cat: "Termes anglophones", term: "Bear market", def: "Marché baissier : période prolongée de baisse des prix des actifs financiers." },
  { cat: "Termes anglophones", term: "Blue chip", def: "Action d'une grande entreprise solide et réputée, considérée comme un investissement relativement sûr." },
  { cat: "Termes anglophones", term: "Penny stock", def: "Action d'une petite entreprise cotée à très bas prix, généralement très volatile et risquée." },
  { cat: "Termes anglophones", term: "Equity", def: "Terme anglais pour les capitaux propres ou, en bourse, les actions d'une entreprise." },
  { cat: "Termes anglophones", term: "Cash flow", def: "Terme anglais pour flux de trésorerie : l'argent qui entre et sort réellement d'une entreprise." },
  { cat: "Termes anglophones", term: "Revenue", def: "Terme anglais pour le chiffre d'affaires ou les revenus d'une entreprise." },
  { cat: "Termes anglophones", term: "Net income", def: "Terme anglais pour le résultat net, le bénéfice final d'une entreprise après toutes les charges." },
  { cat: "Termes anglophones", term: "Gross margin", def: "Terme anglais pour la marge brute : ce qui reste après avoir déduit le coût direct des ventes." },
  { cat: "Termes anglophones", term: "Balance sheet", def: "Terme anglais pour le bilan comptable d'une entreprise." },
  { cat: "Termes anglophones", term: "Income statement", def: "Terme anglais pour le compte de résultat d'une entreprise." },
  { cat: "Termes anglophones", term: "Shareholder", def: "Terme anglais pour actionnaire, détenteur d'actions d'une entreprise." },
  { cat: "Termes anglophones", term: "Stakeholder", def: "Terme anglais désignant toute partie prenante d'une entreprise (actionnaires, salariés, clients, fournisseurs...)." },
  { cat: "Termes anglophones", term: "Fiscal year", def: "Terme anglais pour exercice fiscal, la période de 12 mois utilisée pour les comptes d'une entreprise." },
  { cat: "Termes anglophones", term: "Market cap", def: "Abréviation anglaise de capitalisation boursière." },
  { cat: "Termes anglophones", term: "Day trading", def: "Pratique consistant à ouvrir et fermer des positions boursières dans la même journée." },
  { cat: "Termes anglophones", term: "Short selling", def: "Terme anglais pour la vente à découvert : vendre un actif que l'on ne possède pas en pariant sur sa baisse." },
  { cat: "Termes anglophones", term: "Leverage", def: "Terme anglais pour effet de levier : utiliser la dette pour amplifier le rendement (et le risque) d'un investissement." },
  { cat: "Termes anglophones", term: "Hedge", def: "Terme anglais pour couverture : une opération destinée à réduire un risque financier existant." },
  { cat: "Termes anglophones", term: "Wall Street", def: "Rue de New York symbolisant le monde de la finance américaine et ses grandes institutions financières." },
  { cat: "Termes anglophones", term: "NYSE (New York Stock Exchange)", def: "Plus grande bourse du monde en capitalisation, située à New York." },
  { cat: "Termes anglophones", term: "NASDAQ", def: "Bourse américaine spécialisée historiquement dans les valeurs technologiques." },
  { cat: "Termes anglophones", term: "Dow Jones", def: "Indice boursier américain regroupant 30 grandes entreprises industrielles cotées à Wall Street." },
  { cat: "Termes anglophones", term: "S&P 500", def: "Indice boursier américain regroupant les 500 plus grandes entreprises cotées aux États-Unis." },
  { cat: "Termes anglophones", term: "SEC (Securities and Exchange Commission)", def: "Régulateur des marchés financiers américains, chargé de protéger les investisseurs." },
  { cat: "Termes anglophones", term: "FED (Federal Reserve)", def: "Banque centrale des États-Unis, responsable de la politique monétaire américaine." },
  { cat: "Finance personnelle", term: "Assurance", def: "Contrat par lequel un assureur s'engage à couvrir un risque en échange du paiement d'une prime." },
  { cat: "Finance personnelle", term: "Prime d'assurance", def: "Somme payée régulièrement par un assuré pour bénéficier d'une couverture d'assurance." },
  { cat: "Finance personnelle", term: "Franchise (assurance)", def: "Part des frais qui reste à la charge de l'assuré en cas de sinistre, non remboursée par l'assurance." },
  { cat: "Finance personnelle", term: "Sinistre", def: "Événement dommageable couvert par un contrat d'assurance, donnant lieu à une indemnisation." },
  { cat: "Finance personnelle", term: "Réassurance", def: "Assurance des assureurs eux-mêmes, leur permettant de partager les gros risques avec d'autres compagnies." },

  { cat: "Comptabilité", term: "Tranche marginale d'imposition", def: "Taux d'imposition qui s'applique à la dernière tranche de revenus d'un contribuable, dans un système progressif." },
  { cat: "Comptabilité", term: "Prélèvement à la source", def: "Système où l'impôt sur le revenu est directement retenu sur le salaire avant versement au salarié." },
  { cat: "Comptabilité", term: "Plus-value", def: "Gain réalisé lors de la revente d'un bien ou d'un actif à un prix supérieur à son prix d'achat." },
  { cat: "Comptabilité", term: "Moins-value", def: "Perte réalisée lors de la revente d'un bien ou d'un actif à un prix inférieur à son prix d'achat." },
  { cat: "Comptabilité", term: "Abattement fiscal", def: "Réduction appliquée à un revenu ou une plus-value avant calcul de l'impôt dû." },
  { cat: "Comptabilité", term: "Niche fiscale", def: "Dispositif légal permettant de réduire son impôt en échange d'un comportement encouragé par l'État (investissement, don...)." },
  { cat: "Comptabilité", term: "Fonds de roulement", def: "Ressources stables d'une entreprise (capitaux propres + dettes long terme) moins ses immobilisations, indicateur de sa solidité financière." },
  { cat: "Comptabilité", term: "Capacité d'autofinancement (CAF)", def: "Ressources internes qu'une entreprise génère grâce à son activité, avant décision de distribution ou d'investissement." },
  { cat: "Comptabilité", term: "Seuil de rentabilité", def: "Niveau d'activité à partir duquel les revenus d'une entreprise couvrent exactement l'ensemble de ses charges." },
  { cat: "Comptabilité", term: "Point mort", def: "Date ou niveau de chiffre d'affaires à partir duquel une entreprise commence à être rentable sur une période donnée." },

  { cat: "Macroéconomie", term: "Courbe de Laffer", def: "Théorie selon laquelle au-delà d'un certain taux d'imposition, augmenter les impôts peut réduire les recettes fiscales totales." },
  { cat: "Macroéconomie", term: "Théorie quantitative de la monnaie", def: "Théorie économique reliant la quantité de monnaie en circulation au niveau général des prix." },
  { cat: "Macroéconomie", term: "Monnaie fiduciaire", def: "Monnaie (billets, pièces) dont la valeur repose sur la confiance et non sur un bien physique comme l'or." },
  { cat: "Macroéconomie", term: "Monnaie scripturale", def: "Monnaie qui existe uniquement sous forme d'écritures comptables (comptes bancaires), sans support physique." },
  { cat: "Macroéconomie", term: "Union douanière", def: "Accord entre plusieurs pays supprimant les droits de douane entre eux et adoptant un tarif commun envers les autres pays." },
  { cat: "Macroéconomie", term: "Tarif douanier", def: "Taxe appliquée à un produit lors de son passage à la frontière d'un pays." },
  { cat: "Macroéconomie", term: "Avantage comparatif", def: "Principe économique selon lequel un pays a intérêt à se spécialiser dans la production où il est relativement le plus efficace." },
  { cat: "Macroéconomie", term: "Investissement Direct Étranger (IDE)", def: "Investissement réalisé par une entreprise ou un investisseur d'un pays dans une entreprise d'un autre pays." },
  { cat: "Macroéconomie", term: "Paradis fiscal", def: "Territoire offrant une fiscalité très avantageuse, souvent utilisé pour réduire l'imposition d'entreprises ou de particuliers." },
  { cat: "Macroéconomie", term: "Évasion fiscale", def: "Pratique illégale consistant à se soustraire à l'impôt en dissimulant des revenus ou des actifs." },
  { cat: "Macroéconomie", term: "Optimisation fiscale", def: "Utilisation légale des règles fiscales pour réduire le montant de l'impôt dû." },
  { cat: "Macroéconomie", term: "Seigneuriage", def: "Revenu tiré par un État ou une banque centrale de son pouvoir d'émettre de la monnaie." },
  { cat: "Macroéconomie", term: "Zone de libre-échange", def: "Ensemble de pays ayant supprimé entre eux les droits de douane, sans nécessairement adopter un tarif extérieur commun." },
  { cat: "Macroéconomie", term: "Effet d'éviction", def: "Phénomène où l'emprunt massif de l'État fait monter les taux d'intérêt et réduit l'investissement privé." },

  { cat: "Marchés & Bourse", term: "Obligation zéro-coupon", def: "Obligation qui ne verse aucun intérêt périodique mais est vendue en dessous de sa valeur de remboursement finale." },
  { cat: "Marchés & Bourse", term: "Action préférentielle", def: "Action offrant des droits prioritaires (dividende fixe, priorité en cas de liquidation) mais généralement sans droit de vote." },
  { cat: "Marchés & Bourse", term: "Action ordinaire", def: "Action classique donnant droit de vote et à un dividende variable selon les résultats de l'entreprise." },
  { cat: "Marchés & Bourse", term: "Flottant (free float)", def: "Part des actions d'une entreprise réellement disponible à l'achat en bourse, hors participations stables." },
  { cat: "Marchés & Bourse", term: "OPCVM", def: "Organisme de Placement Collectif en Valeurs Mobilières : structure qui gère de l'épargne collective investie en titres financiers." },
  { cat: "Marchés & Bourse", term: "SICAV", def: "Société d'investissement à capital variable, un type d'OPCVM permettant d'investir collectivement en bourse." },
  { cat: "Marchés & Bourse", term: "FCP (Fonds Commun de Placement)", def: "Autre forme d'OPCVM, copropriété de valeurs mobilières gérée pour le compte des investisseurs." },
  { cat: "Marchés & Bourse", term: "Conseiller en gestion de patrimoine", def: "Professionnel qui accompagne une personne dans l'organisation et l'optimisation de son patrimoine financier." },
  { cat: "Marchés & Bourse", term: "Gestion sous mandat", def: "Service où un professionnel gère un portefeuille d'investissement à la place du client, selon un profil défini." },

  { cat: "Termes anglophones", term: "FDIC", def: "Organisme américain qui garantit les dépôts bancaires des particuliers en cas de faillite d'une banque." },
  { cat: "Termes anglophones", term: "401(k)", def: "Plan d'épargne retraite américain proposé par les employeurs, avec des avantages fiscaux." },
  { cat: "Termes anglophones", term: "Quarterly earnings", def: "Résultats financiers trimestriels qu'une entreprise cotée publie régulièrement." },
  { cat: "Termes anglophones", term: "Dividend yield", def: "Terme anglais pour le rendement du dividende, rapporté au prix de l'action." },
  { cat: "Termes anglophones", term: "Assets", def: "Terme anglais pour les actifs, ce qu'une entreprise ou une personne possède." },
  { cat: "Termes anglophones", term: "Liabilities", def: "Terme anglais pour le passif, ce qu'une entreprise ou une personne doit." },
  { cat: "Termes anglophones", term: "Debt", def: "Terme anglais pour la dette." },
  { cat: "Termes anglophones", term: "Operating margin", def: "Terme anglais pour la marge opérationnelle, le résultat d'exploitation rapporté au chiffre d'affaires." },
];

let _audioCtx = null;
function getAudioCtx(){ try { if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return _audioCtx; } catch(e){ return null; } }
function playTone(freq, dur, type, delay, vol){
  const ctx = getAudioCtx(); if(!ctx) return;
  try {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type||'sine'; osc.frequency.value = freq; gain.gain.value = vol||0.08;
    osc.connect(gain); gain.connect(ctx.destination);
    const t0 = ctx.currentTime + (delay||0);
    osc.start(t0);
    gain.gain.setValueAtTime(vol||0.08, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    osc.stop(t0+dur);
  } catch(e) {}
}
function playCorrectSound(){ if(!P.muted){ playTone(660,.12); playTone(880,.15,'sine',.1); } }
function playWrongSound(){ if(!P.muted) playTone(180,.25,'square',0,.05); }

  const colors = ['#D4AF37','#8AA876','#B85C5C','#5B8DB8','#B36B8F'];
  for(let i=0;i<26;i++){
    const p = document.createElement('span');
    const left = Math.random()*100, delay=Math.random()*.3, dur=1.1+Math.random()*.7, rot=Math.random()*360;
    p.style.cssText = `position:absolute;top:-10px;left:${left}%;width:6px;height:10px;background:${colors[i%colors.length]};opacity:.9;animation:confettiFall ${dur}s ease-in ${delay}s forwards;transform:rotate(${rot}deg);`;
    wrap.appendChild(p);
  }
  document.getElementById('app').appendChild(wrap);
  setTimeout(()=>wrap.remove(), 1900);
}

function startLevel(level){
  S.activeLevel = level; S.mIndex = 0; S.stage = 'lesson'; S.selected = null;
  S.sessionScore = 0; S.scoredModules = {}; S.streak = 0; S.lessonDone = false;
  S.attempts = 0; S.lives = 5; S.bonusXP = 0; S.timeLeft = null;
  clearInterval(S.chronoTimerId);
  S.view = 'quiz';
  render();
}
function startLevelById(kind, idOrGroup){
  if (kind === 'level') startLevel(LEVELS[idOrGroup]);
  else if (kind === 'synth') startLevel(buildSynthesisQuiz(LEVELS, Number(idOrGroup)));
  else if (kind === 'interview') startLevel(INTERVIEW_LEVEL);
  else if (kind === 'case') startLevel(CASE_STUDY_LEVEL);
  else if (kind === 'finalexam') startLevel(buildFinalExam());
  else if (kind === 'revision') startRevision();
}
function shuffleArray(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function computeAnswerOrder(){
  const m = S.activeLevel.modules[S.mIndex];
  S.answerOrder = shuffleArray(m.a.map((_, i) => i));
}

function goToQuestion(){
  S.stage = 'question'; S.attempts = 0;
  computeAnswerOrder();
  if (P.chronoMode) startChronoTimer(20); else S.timeLeft = null;
  render();
}
function startChronoTimer(seconds){
  S.timeLeft = seconds;
  clearInterval(S.chronoTimerId);
  S.chronoTimerId = setInterval(() => {
    S.timeLeft -= 1;
    if (S.timeLeft <= 0) {
      clearInterval(S.chronoTimerId);
      answer(-1);
      return;
    }
    const el = document.getElementById('chronoNum');
    const fill = document.getElementById('chronoFill');
    if (el) el.textContent = S.timeLeft + 's';
    if (fill) fill.style.width = (S.timeLeft/20*100) + '%';
  }, 1000);
}
function reviewLesson(){
  clearInterval(S.chronoTimerId);
  S.stage = 'lesson'; S.selected = null; S.lessonDone = false;
  render();
}
function retryQuestion(){
  S.stage = 'question'; S.selected = null;
  computeAnswerOrder();
  if (P.chronoMode) startChronoTimer(20);
  render();
}
function restartLevel(){ startLevel(S.activeLevel); }
function quitToMap(){ clearInterval(S.chronoTimerId); S.view = 'map'; render(); }

function answer(i){
  if (S.selected !== null) return;
  clearInterval(S.chronoTimerId);
  S.selected = i;
  const m = S.activeLevel.modules[S.mIndex];
  S.attempts += 1;
  const isCorrect = i === m.correct;
  if (isCorrect) {
    if (!S.scoredModules[S.mIndex]) { S.sessionScore += 1; S.scoredModules[S.mIndex] = true; }
    S.streak += 1;
    playCorrectSound();
    if (P.chronoMode && S.timeLeft !== null && S.timeLeft >= 10) S.bonusXP += 5;
    if (typeof S.activeLevel.id === 'number') {
      P.missedQueue = (P.missedQueue||[]).filter(it => !(it.levelId===S.activeLevel.id && it.moduleIndex===S.mIndex));
      saveProgress();
    }
  } else {
    S.streak = 0;
    S.lives = Math.max(0, S.lives - 1);
    playWrongSound();
    if (typeof S.activeLevel.id === 'number') {
      const exists = (P.missedQueue||[]).some(it => it.levelId===S.activeLevel.id && it.moduleIndex===S.mIndex);
      if (!exists) { P.missedQueue = [...(P.missedQueue||[]), { levelId: S.activeLevel.id, moduleIndex: S.mIndex }]; saveProgress(); }
    }
  }
  S.stage = 'explain';
  render();
}

function nextModule(){
  const isLast = S.mIndex === S.activeLevel.modules.length - 1;
  if (!isLast) {
    S.mIndex += 1; S.stage = 'lesson'; S.selected = null; S.lessonDone = false; S.attempts = 0; S.timeLeft = null;
    render();
    return;
  }
  const finalScore = S.sessionScore;
  const total = S.activeLevel.modules.length;
  const passed = finalScore/total >= 0.6;
  const earnedXP = finalScore*10 + (passed?20:0) + S.bonusXP;

  const nextCompleted = { ...P.completed };
  const prevBest = nextCompleted[S.activeLevel.id]?.score || 0;
  nextCompleted[S.activeLevel.id] = { score: Math.max(prevBest, finalScore), total, passed: passed || nextCompleted[S.activeLevel.id]?.passed };

  if (passed && typeof S.activeLevel.id === 'number') {
    P.unlocked = Math.max(P.unlocked, Math.min(S.activeLevel.id + 2, LEVELS.length));
  }
  if (S.activeLevel.id === 'revision') {
    P.missedQueue = (P.missedQueue||[]).filter((_, idx) => !S.scoredModules[idx]);
  }
  P.completed = nextCompleted;
  P.xp = P.xp + earnedXP;
  saveProgress();

  if (passed) { fireConfetti(); playLevelUpSound(); }
  S.view = 'result';
  render();
}

function renderDailyChallenge(){
  const en = P.lang === 'en';

  const pool = LEVELS.slice(0, P.unlocked).flatMap(l => l.modules);
  if (pool.length === 0) return '';
  const idx = hashStr(today) % pool.length;
  const q = pool[idx];
  const order = q.a.map((_,i)=>i).sort((a,b) => (hashStr(today+'-'+a) % 97) - (hashStr(today+'-'+b) % 97));
  let inner;
  if (alreadyDone) {

  if (P.lang === 'en' && level.title_en) {

  return { title: level.title, subtitle: level.subtitle };

function renderQuiz(){
  const level = S.activeLevel;
  const levelTr = trLevel(level);
  const m = level.modules[S.mIndex];
  const pct = (S.mIndex / level.modules.length) * 100;
  const isCorrect = S.selected === m.correct;
  const outOfLives = S.lives <= 0 && S.stage === 'explain' && !isCorrect;

  let livesHtml = '<div class="fq-lives">';
  for (let i=0;i<5;i++) livesHtml += `<span style="color:${i<S.lives?'#B85C5C':'var(--border)'};">${i<S.lives?'❤️':'🖤'}</span>`;
