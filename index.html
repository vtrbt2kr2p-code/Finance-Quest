    <div style="font-size:11px;color:var(--dim);margin:8px 0 12px;font-style:italic;">${esc(levelTr.title)} · ${S.mIndex+1}/${level.modules.length}</div>`;

  if (S.stage === 'lesson') {
    html += `
      <div class="fq-card">
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px;">🎓 ${t('lessonLabel')}</div>
        <div id="lessonText" style="font-size:13.5px;line-height:1.65;color:var(--soft);min-height:90px;white-space:pre-line;cursor:pointer;"></div>
        ${P.lang==='en' ? `<div style="font-size:10px;color:var(--dim);font-style:italic;margin-top:6px;">${t('translationPending')} — showing French content.</div>` : ''}
        <button id="lessonContinueBtn" class="fq-btn-primary" style="background:${level.color};opacity:.4;cursor:not-allowed;" disabled data-action="goToQuestion">${t('btnJaiCompris')} ›</button>
      </div>`;
  } else {
    html += `<div class="fq-card">`;
    if (P.chronoMode && S.stage === 'question' && S.timeLeft !== null) {
      html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">⚡<div style="flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;"><div id="chronoFill" style="height:100%;background:#F59E0B;width:${(S.timeLeft/20*100)}%;"></div></div><span id="chronoNum" style="font-size:10px;color:var(--dim);font-family:monospace;">${S.timeLeft}s</span></div>`;
    }
    html += `<div style="font-size:15px;line-height:1.5;margin-bottom:14px;">${esc(m.q)}</div><div class="fq-answers">`;
    const order = (S.answerOrder && S.answerOrder.length === m.a.length) ? S.answerOrder : m.a.map((_,i)=>i);
    order.forEach((i) => {
      const opt = m.a[i];
      let cls = 'fq-answer';
      if (S.selected !== null) {
        if (i === m.correct) cls += ' correct';
        else if (i === S.selected) cls += ' wrong';
      }
      html += `<button class="${cls}" ${S.selected!==null?'disabled':''} data-action="answer" data-i="${i}">${esc(opt)} ${S.selected!==null && i===m.correct?'✓':''}${S.selected!==null && i===S.selected && i!==m.correct?'✗':''}</button>`;
    });
    html += `</div>`;

    if (S.stage === 'explain') {
      html += `<div style="font-size:12px;font-weight:bold;margin-top:14px;color:${isCorrect?'#8AA876':'#D08080'};">${isCorrect?t('correctLabel'):(S.selected===-1?t('timeoutLabel'):t('wrongLabel'))}</div>`;
      html += `<div style="display:flex;gap:8px;align-items:flex-start;margin-top:8px;font-size:12px;color:var(--soft);line-height:1.6;">🎓 <span>${esc(isCorrect ? m.explanationCorrect : m.explanationWrong)}</span></div>`;

      if (isCorrect) {
        html += `<button class="fq-btn-primary" style="background:${level.color};" data-action="nextModule">${S.mIndex===level.modules.length-1?t('btnVoirResultat'):t('btnLeconSuivante')} ›</button>`;
      } else if (outOfLives) {
        const outTitle = P.lang==='en' ? 'No more hearts for this level' : 'Plus de vies pour ce niveau';
        const outSub = P.lang==='en' ? "No worries — go back through the lessons, it'll click." : 'Pas grave — reprends depuis les leçons, ça va se fixer.';
        html += `<div style="text-align:center;margin-top:10px;">
          <div style="font-size:13px;font-weight:bold;color:#B85C5C;">${outTitle}</div>
          <div style="font-size:11px;color:var(--dim);margin:4px 0;">${outSub}</div>
          <button class="fq-btn-primary" style="background:${level.color};" data-action="restartLevel">${t('btnRecommencer')}</button>
        </div>`;
      } else {
        if (S.attempts >= 2) {
          const hint = P.lang==='en' ? 'This concept is a bit tricky — reread the lesson calmly, the concrete example often helps it click.' : 'Cette notion résiste un peu — relis la leçon tranquillement, l\'exemple concret aide souvent à faire "clic".';
          html += `<div style="font-size:11px;color:var(--dim);font-style:italic;line-height:1.5;margin-top:10px;border-left:2px solid var(--gold);padding-left:8px;">${hint}</div>`;
        }
        html += `<div style="display:flex;gap:8px;margin-top:14px;">
          <button class="fq-btn-secondary" data-action="reviewLesson">${t('btnRevoirLecon')}</button>
          <button class="fq-btn-primary" style="background:${level.color};margin-top:0;flex:1;" data-action="retryQuestion">${t('btnReessayer')}</button>
        </div>`;
      }
    }
    html += `</div>`;
  }
  return html;
}

function renderResult(){
  const level = S.activeLevel;
  const levelTr = trLevel(level);
  const info = P.completed[level.id];
  const score = info?.score ?? S.sessionScore;
  const total = level.modules.length;
  const passed = info?.passed;
  const pct = Math.round((score/total)*100);
  const passedMsg = P.lang==='en' ? 'The next level is unlocked. Keep it up.' : "Le niveau suivant est débloqué. Continue sur ta lancée.";
  const failedMsg = P.lang==='en'
    ? `You need at least 60% to unlock the rest of "${esc(levelTr.title)}". Reread the lessons and try again.`
    : `Il faut au moins 60% pour débloquer la suite de "${esc(levelTr.title)}". Relis bien les leçons et retente ta chance.`;
  return `
    <div style="padding:14px 0;display:flex;flex-direction:column;align-items:center;text-align:center;">
      <div style="width:110px;height:110px;border-radius:50%;border:3px solid ${level.color};display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;">
        <div style="font-size:24px;font-weight:bold;font-family:monospace;">${pct}%</div>
        <div style="font-size:11px;color:var(--dim);">${score}/${total}</div>
      </div>
      <div style="font-size:17px;font-weight:bold;margin-bottom:6px;">${passed?t('resultPassedTitle'):t('resultFailedTitle')}</div>
      <div style="font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:20px;max-width:320px;">
        ${passed ? passedMsg : failedMsg}
      </div>
      <div style="display:flex;gap:8px;width:100%;">
        <button class="fq-btn-secondary" data-action="restartLevel">${t('btnRecommencer')}</button>
        <button class="fq-btn-primary" style="background:${level.color};margin-top:0;" data-action="setView" data-view="map">${t('btnRetourParcours')} ›</button>
      </div>
    </div>`;
}

function startTypingLesson(){
  const level = S.activeLevel;
  const m = level.modules[S.mIndex];
  const text = m.lesson;
  clearInterval(S.typeTimerId);
  const el = document.getElementById('lessonText');
  const btn = document.getElementById('lessonContinueBtn');
  if (!el) return;
  let idx = 0;
  el.textContent = '';
  const finish = () => {
    clearInterval(S.typeTimerId);
    el.textContent = text;
    S.lessonDone = true;
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
  };
  el.onclick = finish;
  S.typeTimerId = setInterval(() => {
    idx += 2;
    el.textContent = text.slice(0, idx);
    if (idx >= text.length) finish();
  }, 16);
}

function renderFormulas(){
  const en = P.lang === 'en';
  const cats = [...new Set(FORMULAS.map(f=>f.cat))];
  const introText = en ? 'The formula binder.' : 'Le classeur de formules.';
  const pendingNote = en ? `<div style="font-size:10px;color:var(--dim);font-style:italic;margin-bottom:10px;">${t('translationPending')} — categories shown in French.</div>` : '';
  let html = `<div class="fq-intro"> <p>${introText}</p></div>${pendingNote}`;
  cats.forEach(cat => {
    html += `<div class="fq-cat-title">${esc(cat)}</div>`;
    FORMULAS.filter(f=>f.cat===cat).forEach(f => {
      const name = en && f.name_en ? f.name_en : f.name;
      html += `<div class="fq-formula-row"><div class="fq-formula-name">${esc(name)}</div><div class="fq-formula-expr">${esc(f.formula)}</div></div>`;
    });
  });
  return html;
}

function renderGlossary(){
  const en = P.lang === 'en';
  const introText = en
    ? `The complete dictionary of finance and economics — ${GLOSSARY.length} terms, search or browse by theme.`
    : `Le dictionnaire complet de la finance et de l'économie — ${GLOSSARY.length} termes, cherche ou parcours par thème.`;
  const pendingNote = en ? `<div style="font-size:10px;color:var(--dim);font-style:italic;margin-bottom:10px;">${t('translationPending')} — definitions shown in French.</div>` : '';
  return `
    <div class="fq-intro"> <p>${introText}</p></div>
    ${pendingNote}
    <input id="glossarySearch" class="fq-input" placeholder="${t('searchPlaceholder')}" value="${esc(S.glossaryQuery)}">
    <div id="glossaryList">${glossaryListHtml()}</div>`;
}
function normalizeSearch(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function glossaryListHtml(){
  const q = normalizeSearch(S.glossaryQuery);
  if (!q) {
    const cats = [...new Set(GLOSSARY.map(g => g.cat))];
    return cats.map(cat => {
      const rows = GLOSSARY.filter(g => g.cat === cat).map(g =>
        `<div class="fq-glossary-row"><div style="font-size:13px;font-weight:bold;color:var(--gold);margin-bottom:3px;">${esc(g.term)}</div><div style="font-size:12px;color:var(--soft);line-height:1.4;">${esc(g.def)}</div></div>`
      ).join('');
      return `<div class="fq-cat-title">${esc(cat)}</div>${rows}`;
    }).join('');
  }
  const filtered = GLOSSARY.filter(g => normalizeSearch(g.term).includes(q) || normalizeSearch(g.def).includes(q));
  if (filtered.length === 0) return `<div style="font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:20px 0;">${t('noResults')}</div>`;
  return filtered.map(g => `<div class="fq-glossary-row"><div style="font-size:13px;font-weight:bold;color:var(--gold);margin-bottom:3px;">${esc(g.term)} <span style="font-size:9px;color:var(--dim);font-weight:normal;">· ${esc(g.cat)}</span></div><div style="font-size:12px;color:var(--soft);line-height:1.4;">${esc(g.def)}</div></div>`).join('');
}

function renderFlashcards(){
  const en = P.lang === 'en';
  const cards = [
    ...FORMULAS.map(f => ({ front: en && f.name_en ? f.name_en : f.name, back: f.formula, tag: f.cat })),
    ...GLOSSARY.map(g => ({ front: g.term, back: g.def, tag: g.cat })),
  ];
  const card = cards[S.flashIdx % cards.length];
  const introText = en ? 'Tap the card to flip it.' : 'Tape la carte pour la retourner.';
  const revealText = en ? 'tap to reveal' : 'toucher pour révéler';
  return `
    <div class="fq-intro"> <p>${introText}</p></div>
    <div style="font-size:11px;color:var(--dim);text-align:center;margin-bottom:10px;">${(S.flashIdx%cards.length)+1} / ${cards.length} · ${esc(card.tag)}</div>
    <div class="fq-flash" id="flashCard" data-action="flipFlash">
      <div style="font-size:15px;font-weight:bold;line-height:1.5;">${S.flashFlipped ? esc(card.back) : esc(card.front)}</div>
      <div style="font-size:10px;color:var(--dim);margin-top:10px;font-style:italic;">${S.flashFlipped ? '' : revealText}</div>
    </div>
    <div style="display:flex;justify-content:center;gap:10px;margin-top:14px;">
      <button class="fq-btn-secondary" style="flex:0;padding:11px 16px;" data-action="flashNav" data-dir="-1">‹</button>
      <button class="fq-btn-secondary" style="flex:0;padding:11px 16px;" data-action="flashNav" data-dir="1">›</button>
    </div>`;
}

/* ============================ PROGRESSION / RÉVISION ============================ */

function renderProgression(){
  const en = P.lang === 'en';
  const league = getLeague(P.xp);
  const detailed = LEVELS.map((l, idx) => {
    const lvlTr = trLevel(l);
    const info = P.completed[l.id];
    const pct = info ? Math.round((info.score/info.total)*100) : null;
    return { idx, title: lvlTr.title, pct, info, locked: idx >= P.unlocked };
  });
  const done = detailed.filter(d => d.pct !== null);
  const weakest = done.length ? [...done].sort((a,b)=>a.pct-b.pct)[0] : null;
  const strongest = done.length ? [...done].sort((a,b)=>b.pct-a.pct)[0] : null;
  const maxPct = Math.max(...done.map(d=>d.pct), 10);
  const toReview = detailed.filter(d => d.pct !== null && d.pct < 80);
  const missedCount = (P.missedQueue||[]).length;

  let chart = `<div class="fq-chart">`;
  detailed.forEach(d => {
    const barPct = d.pct !== null ? (d.pct/maxPct)*100 : 0;
    chart += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="width:100%;display:flex;align-items:flex-end;height:100px;">
        <div class="fq-chart-bar" style="height:${barPct}%;opacity:${d.pct===null?0.15:1};"></div>
      </div>
      <div class="fq-chart-label">${esc(d.title.length>8?d.title.slice(0,7)+'…':d.title)}</div>
    </div>`;
  });
  chart += `</div>`;

  const introText = en ? 'Your progress, level by level.' : 'Ta progression, niveau par niveau.';
  const leagueLabel = en ? `${league.label} League` : `Ligue ${league.label}`;
  const xpTotal = en ? `${P.xp} total XP · ${P.daily.streak}-day streak` : `${P.xp} XP au total · série de ${P.daily.streak} jour${P.daily.streak>1?'s':''}`;
  const strongLabel = en ? 'Strongest' : 'Point fort';
  const weakLabel = en ? 'Needs work' : 'À retravailler';
  const detailTitle = en ? 'Detail by level' : 'Détail par niveau';
  const notDoneLabel = en ? 'Not attempted' : 'Pas encore tenté';
  const reviewTitle = en ? 'Levels to review' : 'Niveaux à revoir';
  const reviewMsg = missedCount > 0
    ? (en ? `${missedCount} missed question${missedCount>1?'s':''} waiting in Review.` : `${missedCount} question${missedCount>1?'s':''} ratée${missedCount>1?'s':''} en attente dans Révision.`)
    : (en ? 'No pending mistakes — nice work!' : 'Aucune erreur en attente — beau travail !');

  let html = `
    <div class="fq-intro"> <p>${introText}</p></div>
    <div class="fq-card" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <span style="font-size:24px;">${league.icon}</span>
      <div><div class="fq-level-title">${leagueLabel}</div><div class="fq-level-sub">${xpTotal}</div></div>
    </div>
    <div class="fq-card" style="margin-bottom:12px;">${chart}</div>
    ${strongest ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--soft);margin-bottom:8px;">🏅 ${strongLabel} : <b>${esc(strongest.title)}</b> (${strongest.pct}%)</div>` : ''}
    ${weakest && weakest.pct<80 ? `<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--soft);margin-bottom:14px;">🔁 ${weakLabel} : <b>${esc(weakest.title)}</b> (${weakest.pct}%)</div>` : ''}

    <div class="fq-cat-title">${detailTitle}</div>`;

  detailed.forEach(d => {
    if (d.locked) return;
    const statusColor = d.pct === null ? 'var(--dim)' : d.pct >= 80 ? '#8AA876' : d.pct >= 60 ? '#F59E0B' : '#D08080';
    const statusText = d.pct === null ? notDoneLabel : `${d.info.score}/${d.info.total} (${d.pct}%)`;
    html += `<div class="fq-formula-row"><div class="fq-formula-name">${esc(d.title)}</div><div class="fq-formula-expr" style="color:${statusColor};">${statusText}</div></div>`;
  });

  html += `
    <div class="fq-cat-title">${reviewTitle}</div>
    <div class="fq-card" style="margin-bottom:8px;">
      <div style="font-size:12px;color:var(--soft);margin-bottom:${missedCount>0?'10':'0'}px;">${reviewMsg}</div>
      ${missedCount > 0 ? `<button class="fq-btn-primary" style="margin-top:0;" data-action="setView" data-view="revision">${t('drawerRevision')} ›</button>` : ''}
    </div>`;

  return html;
}

function renderRevision(){
  const en = P.lang === 'en';
  const count = (P.missedQueue||[]).length;
  const introText = en ? 'Missed questions come back here to be fixed.' : 'Les questions ratées reviennent ici pour être fixées.';
  if (count === 0) {
    const doneMsg = en ? 'No pending mistakes — nice work!' : 'Aucune erreur en attente — beau travail !';
    return `<div class="fq-intro"> <p>${introText}</p></div>
      <div style="font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:20px 0;">${doneMsg}</div>`;
  }
  const qWord = en ? `${count} question${count>1?'s':''} to review` : `${count} question${count>1?'s':''} à revoir`;
  const sub = en ? 'A short focused session to lock in these concepts.' : 'Une petite session ciblée pour bien ancrer ces notions.';
  const btn = en ? 'Review my mistakes ›' : 'Réviser mes erreurs ›';
  return `
    <div class="fq-intro"> <p>${introText}</p></div>
    <div class="fq-card">
      <div class="fq-level-title">${qWord}</div>
      <div class="fq-level-sub">${sub}</div>
      <button class="fq-btn-primary" data-action="startLevel" data-kind="revision">${btn}</button>
    </div>`;
}

/* ============================ ADMIN (local à cet appareil) ============================ */

function renderAdmin(){
  const visits = P.visits || {};
  const pseudos = Object.keys(visits);
  const totalUsers = pseudos.length;
  const returning = pseudos.filter(p => visits[p].length > 1).length;
  const byDay = {};
  pseudos.forEach(p => visits[p].forEach(d => { byDay[d] = (byDay[d]||0)+1; }));
  const days = Object.keys(byDay).sort().slice(-7);
  const maxV = Math.max(...days.map(d=>byDay[d]), 1);

  let chart = `<div class="fq-chart">`;
  days.forEach(d => {
    chart += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;">
      <div style="width:100%;display:flex;align-items:flex-end;height:100px;"><div class="fq-chart-bar" style="height:${(byDay[d]/maxV)*100}%;"></div></div>
      <div class="fq-chart-label">${d.slice(5)}</div>
    </div>`;
  });
  chart += `</div>`;

  let userRows = pseudos.sort((a,b)=>visits[b].length-visits[a].length)
    .map(p => `<div class="fq-formula-row"><div class="fq-formula-name">${esc(p)}</div><div class="fq-formula-expr">${visits[p].length} jour${visits[p].length>1?'s':''}</div></div>`).join('');

  return `
    <div class="fq-intro"> <p>Fréquentation locale à cet appareil.</p></div>
    <div style="font-size:11px;color:var(--dim);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;line-height:1.5;">
      ⚠️ Cette version autonome (fichier HTML) n'a pas de serveur central : ces statistiques ne comptent que les profils créés <b>sur ce navigateur/appareil précis</b>. Pour suivre plusieurs testeurs sur leurs propres appareils, il faudrait un vrai backend partagé.
    </div>
    <div class="fq-card" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      👥 <div><div class="fq-level-title">${totalUsers} profil${totalUsers>1?'s':''} sur cet appareil</div><div class="fq-level-sub">${returning} revenu${returning>1?'s':''} au moins un 2ᵉ jour</div></div>
    </div>
    <div class="fq-card" style="margin-bottom:12px;">${days.length ? chart : '<div style="font-size:12px;color:var(--dim);text-align:center;">Pas encore de données.</div>'}</div>
    <div class="fq-cat-title">Détail</div>
    ${userRows || "<div style=\"font-size:12px;color:var(--dim);font-style:italic;text-align:center;padding:10px 0;\">Aucune visite enregistrée pour l'instant.</div>"}
    <button class="fq-btn-secondary" style="margin-top:16px;" data-action="setView" data-view="map">Retour au parcours</button>`;
}

/* ============================ ACTUALITÉS ============================ */

function renderNews(){
  const en = P.lang === 'en';
  const allComplete = Object.keys(P.completed).filter(k => P.completed[k].passed).length >= LEVELS.length;
  const introText = en ? 'Ongoing market coverage' : 'Suivi des marchés en continu';
  let html = `<div class="fq-intro"> <p>${introText}</p></div>`;
  if (!allComplete) {
    const lockTitle = en ? 'Unlocked once level 11 is completed' : 'Débloqué au niveau 11 terminé';
    const lockSub = en ? 'Finish the whole path first — news only makes sense once you can already analyze it yourself.' : "Termine d'abord tout le parcours — l'actu n'a de sens que si tu peux déjà l'analyser toi-même.";
    html += `<div class="fq-card" style="display:flex;gap:10px;margin-bottom:14px;">🔒
      <div><div style="font-size:13px;font-weight:bold;">${lockTitle}</div>
      <div style="font-size:11px;color:var(--dim);line-height:1.5;">${lockSub}</div></div></div>`;
  }
  const pendingNote = en ? `<div style="font-size:10px;color:var(--dim);font-style:italic;margin-bottom:10px;">${t('translationPending')} — shown in French.</div>` : '';
  html += pendingNote + `<div style="opacity:${allComplete?1:0.35};pointer-events:${allComplete?'auto':'none'};">`;
  NEWS_SAMPLE.forEach(n => {
    html += `<div class="fq-card" style="margin-bottom:8px;">
      <span style="font-size:10px;color:var(--gold);font-family:monospace;text-transform:uppercase;">${esc(n.tag)}</span>
      <p style="font-size:12px;color:var(--soft);margin-top:4px;line-height:1.5;">${esc(n.text)}</p>
      <div style="display:flex;gap:6px;align-items:flex-start;margin-top:8px;font-size:11px;color:var(--dim);line-height:1.5;font-style:italic;">🎓 <span>${esc(n.explain)}</span></div>
    </div>`;
  });
  const honestNote = en ? 'Honest note: this feed is illustrative in this mockup.' : 'Note honnête : ce flux est illustratif dans cette maquette.';
  html += `<div style="font-size:11px;color:var(--dim);font-style:italic;line-height:1.5;margin-top:8px;">${honestNote}</div></div>`;
  return html;
}

/* ============================ ÉVÉNEMENTS ============================ */

function attachGlobalHandlers(){
  const logo = document.getElementById('logoTapZone');
  if (logo) logo.onclick = logoTap;

  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    if (el._bound) return;
    el._bound = true;
    el.addEventListener('click', (e) => {
      switch (action) {
        case 'setView': setView(el.dataset.view); break;
        case 'toggleDrawer': toggleDrawer(); break;
        case 'setLang': setLang(el.dataset.lang); break;
        case 'toggleChrono': toggleChrono(); break;
        case 'toggleMuted': toggleMuted(); break;
        case 'toggleTheme': toggleTheme(); break;
        case 'resetProgress': resetProgress(); break;
        case 'startLevel': startLevelById(el.dataset.kind, el.dataset.id); break;
        case 'pickAvatar': pickAvatar(el.dataset.avatar); break;
        case 'saveProfile': saveProfile(); break;
        case 'confirmTutorial': confirmTutorial(); break;
        case 'quitToMap': quitToMap(); break;
        case 'goToQuestion': goToQuestion(); break;
        case 'answer': answer(Number(el.dataset.i)); break;
        case 'nextModule': nextModule(); break;
        case 'restartLevel': restartLevel(); break;
        case 'reviewLesson': reviewLesson(); break;
        case 'retryQuestion': retryQuestion(); break;
        case 'setFont': setFont(el.dataset.font); break;
        case 'flipFlash': S.flashFlipped = !S.flashFlipped; render(); break;
        case 'flashNav': S.flashFlipped = false; S.flashIdx = (S.flashIdx + Number(el.dataset.dir) + 999999) % 999999; render(); break;
        case 'dailyAnswer': {
          const i = Number(el.dataset.i), c = Number(el.dataset.correct);
          completeDailyChallenge(i === c, i);
          break;
        }
      }
    });
  });
}

function attachViewHandlers(){
  if (S.view === 'quiz' && S.stage === 'lesson') startTypingLesson();
  if (S.view === 'glossary') {
    const input = document.getElementById('glossarySearch');
    if (input) {
      input.focus();
      input.selectionStart = input.selectionEnd = input.value.length;
      input.oninput = (e) => {
        S.glossaryQuery = e.target.value;
        document.getElementById('glossaryList').innerHTML = glossaryListHtml();
      };
    }
  }
  if (S.view === 'settings') {
    const slider = document.getElementById('textSizeSlider');
    if (slider) {
      slider.oninput = (e) => {
        const val = Number(e.target.value);
        document.getElementById('app').style.zoom = val / 100;
        const label = document.getElementById('textSizeVal');
        if (label) label.textContent = val + '%';
      };
      slider.onchange = (e) => { setTextSizePct(Number(e.target.value)); };
    }
  }
}

/* ============================ INITIALISATION ============================ */
render();
</script>
</body>
</html>
